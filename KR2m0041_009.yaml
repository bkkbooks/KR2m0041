body:
  text: 歷代建元考卷九秀水鍾淵映撰外國考柔然郁久閭氏其先世居北荒元魏號為蠕蠕受羅部可汗豫成以宋大明八年魏和平五年立改元一永康伏名敦可汗豆崘豫成子以魏太和九年立改元一太平候其伏代庫者可汗那蓋以魏太和十六年立改元一太安他汗可汗伏圖那蓋子以魏正始初立改元一始平豆羅伏跋豆伐可汗醜奴伏圖子以魏闕平初立改元一建昌朝鮮檀君降于太白山以唐堯二十五載戊辰立都平壤徙自嶽殷髙宗八祀甲子入阿斯達山為神後朝鮮箕子殷宗室殷亡率衆五千入朝鮮周因封之都平壤傳至四十代孫否稱王卒子準立為衛滿所逼浮海居韓地金馬郡更號韓王與辰韓辨韓為三韓後百濟王溫祚滅之凡傳國千餘年衛滿燕人因盧綰亂亡命渡浿水誘逐箕凖據平壤仍歸朝鮮至孫右渠不奉漢詔武帝遣將滅之新羅始祖赫居世王朴氏以漢宣帝五鳳元年甲子立都辰韓地在位六十一年薨南解王始祖太子以漢平帝元始四年甲子立在位二十一年薨儒理王南解王子以漢更始二年甲申嗣立在位三十四年薨脫解王南解王壻姓昔氏以漢世祖中元二年丁巳立在位二十四年薨婆娑王儒理王子以漢章帝建初五年庚辰立在位三十三年薨祗原王婆娑王子以漢安帝永初六年壬子嗣立在位二十三年薨逸聖王儒理王子以漢順帝陽嘉三年甲戌嗣立在位二十二年薨阿達羅王逸聖王子以漢桓帝永興二年甲午嗣立在位三十一年薨伐休王昔氏脫解王孫以漢靈帝中平元年甲子立在位十五年薨奈解王伐休王孫以漢獻帝建安元年丙子嗣立在位三十五年薨助賁王伐休王太子骨正之子以漢安樂公建興五年丁未立在位十八年薨沾解王助賁王弟以漢安樂公延熙三年庚申立在位十五年薨味鄒王姓金氏助賁王壻以漢安樂公景曜四年辛巳立在位二十三年薨儒理王昔氏以晉武帝太康五年甲辰立在位十五年薨基臨王助賁王孫以晉惠帝元康八年戊午立在位十三年薨訖解王昔氏後以晉懷帝永嘉元年丁卯立在位四十七年薨奈勿王金氏味鄒王弟子以晉穆帝永和十一年乙卯立在位四十七年薨實聖王金氏以晉安帝元興元年壬寅立後為訥祇王所弒訥祇王奈勿王子在位四十二年薨慈悲王訥祇王子以宋世祖大明二年戊戌立在位二十三年薨昭智王慈悲王子在位十二年薨智證王新羅諡法始此智大路昭智王再從弟以齊東昏侯永元二年庚辰立始定國號新羅前此或稱斯盧在位十五年薨法興王原宗智證王子以梁天監十一年壬辰嗣立在位二十七年薨王以南北分裂始建年號建元真興王麥興法興王弟以梁髙祖大同六年庚申立在位三十七年薨改元一鴻濟真智王金輪真興王子以陳宣帝大建八年丙申立在位四年薨真平王伯淨真智王孫太子銅錀之子以陳大建十二年辛丑嗣立在位五十四年薨善德女主德曼真平王女為國人所立號聖祖皇在位十六年薨改元一仁平真德女主勝曼真平王從女為國人所立在位八年薨改元一太和後去年號奉唐永徽正朔太宗武烈王春秋姓金氏真智王後以唐髙宗永徽四年癸丑為國人所立在位八年薨王與唐兵滅百濟新羅始大文武王法敏太宗太子以唐龍朔元年庚申嗣立與唐兵滅髙句麗始一三韓在位二十年薨聖明王正明文武王太子以唐髙宗永淳元年壬午嗣立在位十一年薨孝昭王理洪聖明王太子以唐嗣聖九年壬辰嗣立在位十年薨聖德王隆基改名興先孝昭王弟以唐嗣聖十九年癸卯立在位三十五年薨按唐自嗣聖元年武后廢中宗稱制尋改國號周稱皇帝改元十七而東史但書嗣聖正朔立義如綱目亦良史矣孝成王承慶聖德王太子以唐玄宗開元二十六年戊寅嗣立在位六年薨景德王憲英孝成王弟以唐玄宗天寶二年癸未嗣立在位二十三年薨惠恭王乾運景德王太子以唐代宗永泰元年乙巳嗣立後伊餐志貞作亂上大等金氏良相以兵討之王為亂兵所殺宣德王良相奈勿王十世孫以舉兵討亂自立在位五年薨元聖王敬信奈勿王十二世孫以唐德宗貞元二年丙寅為國人所立在位十三年薨昭聖王俊雍元聖王孫以唐德宗貞元十五年己卯嗣立在位二年薨哀莊王清明改名重熙昭聖王太子以唐德宗貞元十六年庚辰嗣立在位十年為兵部令彥升所弒憲德王彥升昭聖王弟以唐憲宗元和六年辛卯自立在位十八年薨興德王景徽憲德王弟立為太子以唐文宗太和元年丁未嗣立在位十一年薨堂弟均真自立為金明所害僖康王悌隆元聖王孫以唐文宗開成元年丙辰為金明等所立三年遇弒明自立為王其國臣奉均貞之子祐徵討殺之神武王祐徵元聖王孫均貞子以唐文宗開成四年己未立尋薨文聖王慶膺神武王太子以唐文宗開成五年庚申嗣立在位十八年薨憲安王誼靖文聖王弟以唐宣宗大中十一年丁丑立在位四年薨景文王膺廉僖康王孫以唐懿宗咸通三年壬午立在位十四年薨憲康王晸景文王太子以唐僖宗乾符三年丙子嗣立在位十二年薨定康王晃憲康王弟以唐僖宗光啓二年丙寅立二年薨真聖女主曼定康王女弟以唐僖宗文德元年戊申立在位十二年薨泰封王弓裔通鑑作躬乂憲安王孽子以重午日生於外家長為僧眇一目遂聚衆反于北原都松嶽郡復移鐵圓自立為王後十八年其將王建為衆所推裔出走為野人所殺後百濟王甄萱李氏尚州加恩縣人自稱甄萱叛據完山州自立為王後三十年為其子神劒所幽逃歸髙麗國王建討平之神劒國遂滅孝恭王嶢憲康王庶子真聖立為太子以唐昭宗光化元年戊午嗣立在位十六年薨神德王景輝朴氏阿達羅王逺孫以癸酉歲為國人所立六年薨景明王升英神德王子以丁丑歲嗣立八年薨景哀王魏膺景明王弟以後唐同光二年甲申立後甄萱襲陷王都遇弒敬順王傳姓金氏文聖王後以後唐天成二年丁亥為甄萱所立八年以國降于髙麗王建右新羅朴氏十主昔氏八主金氏三十七主合五十五主共九百九十二年髙句麗始祖東明王朱蒙其母柳花河伯女為日影所照娠而生一卵有男破卵而出名朱蒙扶餘王金蛙諸子忌之遁至卒本扶餘其王妻一女王薨以漢元帝建昭二年甲申立自稱髙辛氏之後國號髙句麗因姓髙王薨太子類利立琉璃明王類利始祖在東扶餘所生子後至卒本立為太子得嗣位至王莽偽天鳳五年戊寅薨太武神王無恤琉璃明王太子以王莽天鳳五年戊寅嗣立在位二十八年薨閔中王解邑朱太武神王幼子以漢世祖建武二十一年乙巳立在位三年薨慕本王解憂太武神王太子以漢世祖建武二十四年戊申立在位六年為杜魯所弒太祖王宫琉璃明王孫以漢世祖建武二十九年癸丑立在位九十三年傳位于弟遂成薨次大王遂成太祖王弟以漢質帝本初元年丙戌立後為臨明答天所弒新大王伯固次大王弟為臨丁答夫所立在位十五年薨故國川王男武新大王太子在位十九年薨山上王延優故國川王弟為故國川王于后所立在位三十一年薨東川王優位居山上王太子以漢安樂公建興五年丁未立在位二十二年薨中川王然弗東川王太子以漢安樂公延熙十一年戊辰立在位二十三年薨西川王藥盧中川王子以晉世祖泰始六年庚寅立在位二十三年薨烽上王相夫西川王太子以晉惠帝元康二年壬子立為國相倉卒利所弒美川王乙弗烽上王弟子以晉惠帝永康元年庚申立在位二十三年薨故國原王思由美川王太子以晉成帝咸和六年辛卯立改名釗在位四十一年與百濟戰中流矢薨小獸林王丘夫故國原王太子以晉太宗咸安元年辛未立在位十五年薨故國壤王伊連小獸林王弟以晉烈宗大元九年甲申立在位九年薨廣開土王談德故國壤王太子以晉烈宗大元十七年壬辰立在位二十二年薨長夀王巨璉廣開土王太子以晉安帝義熙九年癸丑立在位七十九年薨魏髙祖册諡為康王北史止稱璉自璉至元與北史無異但封爵及名字不同耳文啓王羅雲北史雲長夀王太孫以齊武帝永明元年癸亥立在位二十九年薨安藏王興安北史安文啓王太子以梁髙祖天監八年己丑立在位十三年薨安延王寶延北史延安藏王弟以梁天監二十年辛丑立在位十五年薨陽原王平成北史成安延王太子以梁天監二十一年壬寅立在位十五年薨平原王陽成北史陽陽原王太子以陳髙祖永定三年己卯立在位二十三年薨嬰陽王元平原王太子以隋髙祖開皇十年庚戌立在位十九年隋煬帝率師來伐不克營留王建武嬰陽王異母弟以唐髙祖武德元年戊寅立在位二十五年為其臣蓋蘇文所弒寶藏王藏營留王之姪以唐太宗貞觀十六年壬寅立太宗親帥師來伐不克後至唐髙宗總章元年戊辰唐將李績拔平壤王浮于京師髙麗亡右髙句麗髙氏二十八王共七百五年百濟與北史不同始祖溫祚髙句麗朱蒙之子朱蒙以類利為太子溫祚恐見忌南行至河南慰禮城以漢成帝鴻嘉三年癸卯立為王國號百濟氏扶餘徙南漢山城又徙南平壤城薨多婁王始祖太子以漢世祖建武四年戊子嗣立在位四十年薨巳婁王多婁王太子嗣立二十五年薨蓋婁王巳婁王太子薨子肖古王立肖古王蓋婁王子以漢桓帝延熹九年乙巳立在位四十九年薨仇首王肖古王子以漢獻帝建安十九年甲午立在位二十一年薨古爾王仇首王弟以漢安樂公建興十二年癸丑立在位五十五年薨責稽王古爾王子以晉世祖太康九年戊申立在位十三年為貊兵所害汾西王責稽王子以晉惠帝元康八年戊午立在位七年為刺客所殺比流王仇首王子以晉懷帝永嘉九年丁卯為國人所立在位四十一年薨契王汾西王子以晉康帝建元二年甲辰立在位二年薨近肖古王比流王子以晉穆帝永和二年丙午立在位三十年薨近仇首王近肖古王子以晉烈宗寧康三年乙亥立在位十年薨枕流王近仇首王子以晉烈宗大元九年甲申立在位一年薨辰斯王枕流王弟以晉烈宗大元十年乙酉立在位八年因獵薨于行營阿革王以晉烈宗大元十八年癸巳立在位十四年薨腆支王阿萃王太子以晉安帝義熙元年乙巳立在位十六年薨久爾辛王腆支王子以宋髙祖永初元年庚申立在位八年薨毗有王久爾辛王子以宋太祖元嘉四年丁卯立在位二十九年薨蓋鹵王餘慶毗有王子嗣立為髙句麗王巨璉所殺文周王蓋鹵王太子以宋蒼梧王元徽三年乙卯立為兵官佐平解仇所殺三斤王文周王太子以宋順帝升明元年丁巳立三年薨東城王牟大文周王之弟子以宋順帝升明三年己未立為其臣芍加所弒武寧王餘隆東城王太子以齊和帝中興元年辛巳討賊嗣立薨子明農立聖明王農武寧王子嗣位以梁元帝承聖二年癸酉率兵侵新羅被殺威德王昌聖王子以梁承聖三年甲戌立在位四十五年薨惠王季明威德王子嗣位二年薨法王宣惠王子嗣位二年薨武王璋法王子嗣位二十四年薨義慈王武王太子嗣位後唐兵來伐拔都城王詣軍門降未幾宗室復福信等起兵迎立義慈之子豐為兵敗奔髙句麗百濟亡右百濟二十八王共七百五年髙麗王氏太祖神聖王建新羅松嶽郡人為弓裔侍中以弓裔十八年丁丑為諸將所立十八年丁未新羅來降丙申平甄氏在位二十六年薨改元一天授惠宗義恭王太祖太子以甲辰嗣立在位二年薨定宗文明王堯太祖第二子以丙申嗣立在位四年薨定宗二年始行後漢年號光宗文成王昭太祖子以辛亥嗣立在位二十六年薨光宗二年始行後周年號光宗十四年始行宋年號景宗