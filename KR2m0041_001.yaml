body:
  text: 歴代建元考卷一秀水鍾淵映撰原序改元非古也周衰道微王者不作列國自相雄長若魏若秦各以稱王之歲改元其事固無足法也漢至孝文天子中新垣平之詐始復更為元年景帝因之延及世宗遂惑羣臣天瑞之説訖帝之世更立年名有號十一始為古今一成不可變之制嗟乎漢之世宗非若後世中材者比也興詩書定禮樂至改易正朔為百王取法尤吾夫子所有志未逮者而年名反自帝倡之故予三復孝武本紀未嘗不惜帝雄才大畧可以進于三代而羣臣將順者之失也自是以降或三四年或五六年未久輒改甚者一歲之中寒暑未更號年疊出編年紀月書法無章而學者欲于數百年之下條舉無遺蓋幾難之予讀史之暇搜考前代諸書其最著者柳璨正閏位厯宋庠紀元通譜目存書亡近代間有作者考覈未備于是徧觀正史旁採覇書外及海外屬國之紀踰月書成列為五卷至改元以前帝王世系别為首卷皇王僭偽諸凡又作類要一卷而上下千百年間耳目之所及者庶幾粲然無遺憾矣然予因之有感焉年號之興起于方士之無稽繼以盈廷之從諛與古大臣祈天永命之説何與哉乃數十代靡然從之非此無以章受命迓天休慶星甘露之祥麟鳳龜龍之異無不以之名年而治終不古若善乎號不屢更陳承祚所以歸美諸葛也有明繼代髙皇帝享國最久大經大法不憚再四更張獨洪武之元終世不易聖子神孫踵而行之而歴代相沿之謬始革嗚呼變法亂制者易居今復古者難獨一建元云乎哉書目古今年號錄一卷唐封演集并序以肅宗至徳代宗永泰乃陳後主齊明帝年號為失于考據遂起漢武建元至于唐纂為一卷正閏位厯三卷唐柳璨撰建元厯二卷唐張敦素撰嘉號録一卷唐韋美撰年號録一卷南唐徐闕撰古今類聚年號圖一卷蜀杜光庭撰自漢武元年辛丑至蜀乾徳元年己卯凡一千五十九年歴一百八十九君改四百七號内六十號重出歴代年號一卷宋丞相饒陽李昉撰年號厯一卷紀年類一卷元類一卷見崇文書目紀年通譜十二卷宋參政宋庠撰以古今運厯之書凡十餘家皆無可采遂取十七代正史百家雜記凡正偽年號括為一書斷自漢文後元之戊寅下止周恭帝顯徳之庚申凡一千二百二十二歲并本朝建隆之元至慶厯元年之辛巳合為十二卷有五號曰正曰閏曰偽曰賊曰蠻夷其十八篇曰統元以甲子貫之其二篇曰類元運厯圖六卷宋龔頴撰晁氏曰按晉史張軌世襲凉土但稱愍帝建興年號其間惟張祚纂竊改建興四十二年為和平元年張天錫執政始奉穆帝升平之朔始末不聞有改元事惟頴書載張寔改元曰永安張茂改元曰永元張重華曰永樂曰和平張元龍曰太始張天錫曰太清張大豫曰鳳凰不知穎何所據而言然或云出崔鴻十六國春秋鴻書久不傳于世莫得而考焉編年通載十五卷張衡撰編歴代年號貫以甲子始于帝堯訖于治平丁未疑年譜一卷年畧譜一卷雜附劉恕撰歴代紀年賦一卷大理丞楊備撰自漢至五代别為宋頌四章歴代紀年十卷紹興中晁公邁撰古今年號録五卷紹熈五年八月侯望造自漢建元至今一千三百三十五年正偽年號總八百三十八為字二百三十五歴代紀年纂要一卷元察罕撰紀年録一卷明邱濬撰正閏考十卷明沈徳符撰總論春秋正義曰漢魏以來雖秋冬改元史于春夏即以元年冠之是以因于古也元者氣之本也善之長也人君執大本長庶物欲其與元同體故年稱元也諸侯于其封内各得改元傳説鄭國之事云僖之元年簡之元年是諸侯皆改元非獨魯也隋志曰道經有延康赤明龍漢開皇是其年號春秋後傳曰惟王者改元諸侯改元自汾王以前未有也晉竹書曲沃莊伯十一年十一月則用夏正為歲首而秦譜至宣公初志閏月不惟改元又改厯矣書正義曰顧氏云殷家猶質踰月即改元年以明世異不待正月以為首也郎顗曰仲終季始厯運變改故可改元所以順天道也文中子曰改元立號非古也其于彼心自作之乎王應麟曰漢武六年一改號自太初後四年一改孝昭亦六年一改孝宣四年一改孝元五年一改孝成四年一改餘改號皆不常又曰年號及十年以上不改者光武建武三十一孝明永平十八孝和永元十六獻帝建安二十四蜀漢後主建興十五延熙二十吳大帝赤烏十二晉武泰始十太康十穆帝永和十二孝武太元二十一安帝義熙十四宋文帝元嘉三十齊武永明十一梁武天監十八大同十一陳宣大建十四魏昭成稱代建國三十九道武登國十太武真君十一孝文太和二十三西魏文帝大統十七隋文開皇二十煬帝大業十三唐太宗貞觀二十三𤣥宗開元二十九天寶十四代宗大厯十四徳宗貞元二十一憲宗元和十四宣宗大中十三懿宗咸通十四愚案改元及十年以上者尚有前趙主曜光初十二後趙太祖虎建武十四成太宗雄玉衡二十四前秦世祖堅建元二十前燕後主暐建熙十一後秦髙祖興𢎞始十七北燕太祖跋太平二十三北凉武宣王蒙遜𤣥始十五西凉武昭王暠建初十三西秦武元王乾歸十三南唐元宗保大十五南漢髙祖襲大有十四中宗晟乾和十四孟蜀後主昶廣政二十八宋則髙宗紹興三十二孝宗淳熙十六寧宗嘉定十七理宗淳祐十三遼則穆宗璟應厯十九聖宗隆緒統和二十太平十一興宗宗真重熙二十四西遼仁宗伊喇紹興十三承天后崇福十四珠勒呼天禧三十四金太宗晟熙宗亶天會共十四世宗雍大定二十九夏景宗元昊天授禮法延祚十一惠宗秉常大安十一崇宗乾順貞觀十三桓宗純祐天慶十四元則世祖至元三十一成宗大徳十一順帝至正二十七又東漢初公孫述龍興十二唐初梁師都永隆十二俱玉海不載若元代諸帝則王氏以後事也又曰舜典紀元日商訓稱元祀春秋書元年人君之元即乾坤之元也大哉乾元萬物資始天之用也至哉坤元萬物資生地之用也成位乎其中則與天地參元即仁也仁人心也衆非元后何戴后體元則仁覆天下矣即位之一年必稱元年累數雖久而不易戰國而下此義不明秦惠文王十四年更為元年汲冡竹書魏惠王有後元始變謂一為元之制漢文帝十有六年惑方士説改後元年景帝因之壬辰改中元戊戌改後元猶未以號紀年也武帝因之建號一元曰建二元以長星曰光六年而更始曰朔郊得一角獸曰狩顔氏謂年號起建元劉氏據封禪書謂起元鼎吕氏謂元鼎亦追改也元封改元始有詔曰登封泰山至于梁父然後并䄠肅然自新嘉與士大夫更始其以十月為元封元年及征和之後復改後元年于是武帝厭改元矣歴代㳂襲或五六年或三四年或一歲再更或一歲三號記注繁蕪莫之勝載哀帝以建平二年為太初元将見于王莽傳世祖以建武三十二年為建武中元見于續漢志而本紀削二字梁之大同大通俱有中字亦憲章于建武也經載十二而年各不易陳夀以美諸葛武侯間有復古號為元年如魏廢帝恭帝周閔帝明帝唐肅宗未幾仍舊蓋春秋之義不明久矣即位踰年改元古制也劉禪孫亮石𢎞苻生李景未踰年而改世以議焉晉惠帝改武帝太熙為永熙謂欲長奉先帝之制亦非也議者以為違春秋踰年書即位之義唐順宗以貞元二十一年正月嗣位至八月改永貞蓋已稱太上皇嫌于獨無紀年故亟更之太平興國之改元不俟踰年史臣謂與常例不同又有踰年而不改元者唐中宗仍武后神龍代宗繼寶應至七月梁末帝追承乾化晉少帝襲天福至九年孟昶仍父明徳漢髙祖追用晉天福隠帝仍父乾祐愚案北漢世祖及孝和帝復承用之至九年而止四主共一號更前此所未有周世宗承太祖顯徳皆非禮之正唐哀帝仍昭宗天祐蓋畏朱温而不敢云漢獻除光熹昭寜永漢梁元帝黜大寶梁末帝黜鳳厯諉云繼故晉惠後改永安漢高祖黜開運最為無謂自唐徳宗慨想貞觀開元之盛改貞元以法二祖愚案紀元用先代名始于唐徳宗貞元合貞觀開元之名用李泌言我朝因之若淳熙慶元開禧之類是也元祐之號或謂並用元豐嘉祐而有對鉤之談隆興欲隆紹興之治紹熙將紹淳熙之政詞臣草詔乃合建隆紹興及紹興淳熙為義非初意矣夫厯世無窮而美名有盡于是有離合之䜟有重複之嫌如永昌隆昌為二日大亨為一人二月了天保為一大人只十徳昌為得二日宣政為宇文亡日大象為天子家廣運為軍走大業為大苦末廣明為唐去丑口而著黄家日月太平為一人六十咸字人口有戈宣和為一家有二日靖康為十二月立康建炎為兩火此離合之䜟也炎興應司馬氏之名升平有不滿斗之謡大足若數足而則天改之天元為周號昌字乃二日而李泌議之成字負戈美者大羊亨為子不成而神宗避之隆興近正隆純熙旁作屯而孝宗更之治平或謂大徳不宜用水康定靖康或謂其如謚法天聖于文為二人明道于文為日月並蓋以母后之臨朝也乾道九年而改謂用九之數已極純熙之易為淳避告成大武之語發號告元其謹始如此乃若晉建興同孫劉之號唐至徳永泰襲陳齊之舊晉惠六同漢號一用吳號漢哀之太初晉元之建武魏孝武之永興唐肅宗之上元皆自重一代之號乾徳蜀號也因宫人鏡背而後知隆興偽號也因曾布日錄而後見建中靖國之紀元曾肇以唐建元為疑欲改建字為執字任伯雨亦以唐為戒而徽宗謂梁末禪位年號太平太宗不以為嫌重和犯北敵重熙之稱一年而亟改髙孝欲用炎興乾統以劉蜀北敵已用而更議此重複之嫌也至和三年而改以至道末年為忌熙寧崇寧或云同劉宋陵名宣和或云契丹宫門名其避忌又不止于重複矣然晉有立始長順之筮唐有元和咸通之兆我朝有重火之䜟是亦有數存焉若文王以受命之年為元年緯書之説也文王不宜改元而又改元愚案詩文王正義尚書運期授注云周文王以闕二十九年受命受命之月已是季秋至明年乃改元武成正義文王斷虞芮之訟諸侯歸之改稱元年武王宜改元而不改元愚案書序云惟十有一年武伐殷注云本文王受命而數之歐陽子嘗辨其妄矣道家有延康赤明龍漢開皇之紀上皇無極永夀之號事不經見云陳繼儒偃曝談餘曰昔人云年號毋論正統僭偽自漢武至晉大都承襲劉宋以後間亦有之自乾徳後及于元朝皆前代所未有而實不然余嘗總考之漢武建元安建元晉康建元劉聰僭號建元苻堅僭號建元蕭齊髙建元漢武太始晉武太始張𤣥靚僭號太始漢宣甘露孫皓甘露苻堅僭號甘露漢宣黄龍孫權黄龍漢元永元和永元張茂僭號永元漢成永始髙雲僭號永始漢哀建平石勒慕容盛慕容徳皆僭號建平光武建武晉元建武石虎僭號建武蕭齊明建武漢明永平拓跋恪永平王建僭號永平漢章建初西凉李暠後蜀李特俱僭號建初漢章元和唐憲元和漢和永元蕭齊東昏永元張茂僭號永元漢和元興孫皓元興晉安元興漢安永初南宋武永初漢安永寧晉惠永寧石祗僭號永寧漢順永建李恂僭號永建漢順永和晉穆永和牧犍僭號永和姚泓僭號永和閩王延鈞僭號永和漢冲永嘉晉懐永嘉漢桓建和利鹿孤僭號建和漢桓元嘉南宋文元嘉漢桓永興晉魏永興苻秦拓跋嗣皆僭號永興漢桓永康晉惠永康慕容寶乞伏熾盤皆僭號永康漢靈中和唐僖中和漢後主建興孫亮建興慕容垂李雄皆僭號建興晉武太康遼道宗𢎞基太康晉惠永安孫休永安張軌拓跋攸沮渠蒙遜皆僭號永安晉帝奕太和曹叡太和秃髮烏孤石勒拓跋宏李勢楊溥皆僭號太和又唐文太和晉孝武太元張駿僭號太元晉恭元熙劉淵僭號元熙蕭齊和中興拓跋郎中興蕭梁敬太平孫亮太平馮跋隋末林士𢎞遼