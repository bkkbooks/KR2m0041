body:
  text: 歷代建元考卷二秀水鍾淵映撰前編盤古氏一曰渾敦氏首出御世天皇氏繼盤古氏以治一姓十三人兄弟各一萬八千歲始制干支地皇氏繼天皇氏以治一姓十一人兄弟各一萬八千歲始定三辰分晝夜以三十日為一月人皇氏繼地皇氏以治一姓九人兄弟合四萬五千六百歲自天皇氏至此為九頭紀說見春秋緯巨靈氏句疆氏譙明氏涿光氏鉤陳氏黃神氏􅩅神氏犂霛氏大騩氏鬼騩氏弇兹氏泰逢氏冉相氏蓋盈氏大敦氏靈陽氏巫常氏泰一氏空桑氏神民氏一曰神皇氏倚帝氏次民氏以上二十二氏為循蜚紀辰放氏傳四世蜀山氏蜀國肇自人皇其始蠶叢柏獲魚鳬三君各數百歲號蜀山氏最後禪位鱉靈號望帝者即其後也豗傀氏傳六世渾沌氏傳七世東户氏傳十七世皇覃氏傳七世啓統氏傳三世吉夷氏傳四世几蘧氏狶韋氏傳四世有巢氏傳二世燧人氏傳八世庸成氏傳八世以上十三氏為因提紀太昊伏羲氏風姓生于成紀以木德繼天而王都于陳緯書伏羲氏以建寅為正在位百五十年崩史皇氏名頡一曰蒼帝柏皇氏中央氏一曰中皇氏大庭氏一曰朱顔氏栗陸氏昆連氏一曰驪連氏焱氏泰氏成鳩氏素皇氏內專氏軒轅氏赫胥氏葛天氏尊盧氏祝融氏一曰赤帝昊英氏一曰子英氏有巢氏朱襄氏一曰子襄氏陰康氏無懷氏宋張栻曰外紀伏羲之後有女皇柏皇中央大庭栗陸昆連混沌赫胥尊盧昊英有巢朱襄葛天陰康無懷凡十有五氏相繼為天子而後神農氏作及考伏羲命官十五氏多與焉則是皆佐伏羲之臣也四明陳牼謂軒轅祝融或當在太昊前餘合繫太昊後又疑為當時各君一方如後世諸侯之國者未知孰是姑雜考諸家所紀附于伏羲後云女皇氏太昊氏女弟名媧時共工氏為亂討誅之以木德王在位百三十年崩共工氏名康回為女媧氏所滅炎帝神農氏姜姓起于烈山以火德代伏羲氏治天下都陳遷曲阜緯書神農氏以建丑為正在位百四十年崩于長沙之茶鄉帝臨魁神農子在位八十年帝承臨魁子在位六十年帝明帝承之子在位四十九年帝宜一曰帝直帝明之子在位四十年帝來一曰帝克帝宜之子在位四十八年帝裏一曰帝居帝來之子在位四十三年帝榆罔帝裏之曾孫帝嗣位後其臣蚩尤作亂徙居涿鹿五十五年諸侯尊軒轅氏為天子降封帝于潞神農氏亡以上為禪通紀自黃帝以下至周為疏仡紀黃帝有熊氏曰軒轅姓公孫有熊國君少典之子生于軒轅之丘嗣為諸侯討殺蚩尤于涿鹿遂即天子位以土德王始作甲子制厯象緯書黃帝以建子為正在位百十年丙午崩少昊金天氏名摯曰𤣥囂黃帝之子或曰黃帝子青陽氏之子别為己姓丁未繼黃帝以金德王天下都曲阜在位八十四年庚午崩有鴻氏名休黃帝子别為僖姓黃帝崩嗣立在位四十七年而崩葬于雍愚按諸書俱以少昊承黃帝有鴻氏載見别紀四明陳牼附注列于黃帝之後因録以傳疑焉顓頊髙陽氏黃帝之孫父曰昌意别為姬姓辛未以水德王天下都帝丘作厯象以建寅月為厯元在位七十八年戊子崩按伏羲之後有軒轅氏以制乘車而名乃黃帝亦曰軒轅世遂訛為一人不知實則一號名不相蒙也又漢孔安國序書以伏羲神農黃帝為三皇少昊顓頊帝嚳堯舜為五帝唐司馬貞遂以太昊女媧神農為三皇且復載天皇地皇人皇之說二說不同而朱子獨從孔說云宋王應麟玉海黃帝五始文曰春秋正義春秋緯稱黃帝受圖有五始說公羊傳云元者氣之始春者四時之始王者受命之始正月者政教之始公即位者一國之始春秋緯云黃帝坐于扈閣鳳凰銜書致帝前其中得五始之文謂此五事帝嚳髙辛氏黃帝之曾孫𤣥囂之孫蟜極之子己丑以木德王天下在位七十年戊戌崩帝摯髙辛之子以戊戌嗣立在位五年諸侯廢之帝堯陶唐氏祁姓曰放勳帝嚳之子初侯于陶改封唐故曰陶唐以甲辰即天子位都平陽以火德王定閏法在位七十二載乙卯禪于舜癸未崩帝舜有虞氏姚姓曰重華髙陽氏之後父曰瞽瞍以帝堯七十二載乙卯攝行天子事二十八載丙戌始代堯踐帝位以土德王都蒲坂丁巳禪于禹十有七載癸酉崩在位五十載夏姒姓后禹顓頊之孫鯀之子治水有功以丁巳受舜禪癸酉舜崩避于陽城丙子始即位改元以金德王都安邑改載為歲癸未崩于會稽在位六十九歲竹書紀年元年頒夏時于邦國后啓禹之子以甲申嗣立九歲壬辰崩后太康啓子以癸巳嗣立二十九歲辛酉畋于洛為有窮后羿所距崩于陽夏后仲康太康弟以壬戌嗣立十三歲甲戌崩后相仲康子以乙亥嗣立八歲寒浞殺羿二十七歲辛丑寒浞使其子澆弒于帝丘寒浞以辛丑弒后相篡夏四十年壬午為夏故臣靡所滅后少康相子以壬午滅浞嗣立二十二歲癸卯崩后杼少康子以甲辰嗣立十七歲庚戌崩后槐杼子以辛酉嗣立二十六歲丙戌崩后芒槐子以丁亥嗣立十八歲甲辰崩后泄芒豫以乙巳嗣立十六歲庚申崩后不降泄子以辛酉嗣立五十九歲遜位于弟扃又十歲崩竹書曰三代之世內禪惟不降實有聖德后扄不降弟以庚申嗣立二十一歲庚辰崩后厪扃子以辛巳嗣立二十一歲辛丑崩后孔甲厪子以壬寅嗣立三十一歲壬申崩后臯孔甲子以癸酉嗣立十一歲癸未崩后發臯子以甲申嗣立十九歲壬寅崩后履癸是為桀以癸卯嗣立五十三歲乙未以失道為殷湯所伐放居南巢夏后氏亡右夏一十七世四百四十一年內寒浞篡位四十年始甲戌訖乙未竹書自禹至桀十七世有王與無王歷歲四百七十一年起壬子終壬戌其所載甲子厯數與史多異蓋戰國史氏之繆也殷子氏湯名履契之十四世孫商侯癸之子以夏后癸戊寅嗣為諸侯十七載以乙未滅夏即天子位以水德王都亳改夏建寅正以十二月為歲首歲曰祀三十祀丁未崩宋胡氏皇王大紀論曰古史不載湯改元獨劉道原載之非其實也夫人君即位之一年謂之元年一定而不可易也成湯之元立于桀之三十五載矣其所以克享天心受天明命以有九有之師爰革夏正本是而為之者也又可改乎元者義之所存非若一二之為數也後世以元為數而不知其義如漢武之初年曰建元元年既曰元年則元既建矣又曰建元豈不贅乎後又因事别建年號失其義矣如人君知此義而體之則元原于一豈至如是紛紛乎太宗太甲名至成湯太子太丁之子以戊申嗣立三十三祀庚辰崩愚按竹書太甲之前有外丙名勝在位二年仲壬名庸在位四年蓋泥于孟子之文而不知古人以歲為年非謂踐阼之厯數也至云伊尹篡位為太甲所殺則又誕而不經矣沃丁名絢太甲子以辛巳嗣立二十九祀己酉崩太庚名辨沃丁弟以庚戌嗣立二十五祀甲戌崩小甲名髙太庚子以乙亥嗣立十七祀辛卯崩雍己名佃小甲弟以壬辰嗣立十二祀癸卯崩中宗太戊名密雍巳弟以甲辰嗣立七十五祀戊午崩仲丁名莊太戊子以己未嗣立遷都囂十三祀辛未崩外壬名發仲丁弟以壬申嗣立十五祀丙戌崩河亶甲名整外壬弟以丁亥嗣立徙都相九祀乙未崩祖乙名滕河亶甲子以丙申嗣立徙都耿復徙邢十九祀甲寅崩祖辛名旦祖乙子以乙卯嗣立十八祀庚午崩沃甲名踰祖辛弟以辛未嗣立二十五祀己未崩祖丁名新祖辛子以丙申嗣立三十二祀丁卯崩南庚名更沃甲子以戊辰嗣立二十五祀壬辰崩陽甲名和祖丁子以癸巳嗣立七祀己亥崩盤庚名旬陽甲弟以庚子嗣立遷都殷改國號曰殷二十八祀丁卯崩小辛名頌盤庚弟以戊辰嗣立二十一祀戊子崩小乙名斂小辛弟以己丑嗣立二十八祀丙辰崩髙宗武丁名昭小乙子以丁巳嗣立五十九祀乙卯崩祖庚名曜武丁子以丙辰嗣立七祀壬戌崩祖甲名載祖庚弟以癸亥嗣立三十三祀乙未崩廩辛名先祖甲子以丙申嗣立六祀辛丑崩庚丁名囂廪辛弟以壬寅嗣立三十一祀壬戌崩武乙名瞿庚丁子以癸亥嗣立徙居河北四祀丙寅崩太丁名托武乙子以丁卯嗣立三祀己巳崩帝乙名羡太丁子以庚午嗣立三十七祀丙午崩帝辛名受帝乙子是為紂以丁未嗣立無道三十三祀己卯周武王來伐戰敗自燔死殷亡右殷二十八世六百四十五年始丁未訖己卯漢書律厯志自伐桀至武王伐紂六百二十九歲又曰殷世繼嗣三十一王六百二十九歲蓋并外丙仲壬數之而更縮其年誤也周姬氏武王發后稷十六世孫文王昌之子以商紂二十一祀丁卯嗣西伯位己卯滅紂即天子位以火德王都鎬改殷建丑正以十一月為歲首祀曰年七年乙酉崩戴記世子篇武王九十三歲而終竹書紀年曰武王五十四成王誦武王子以丙戌嗣立三十七年壬戌崩康王釗成王子以癸亥嗣立二十六年戊子崩昭王瑕康王子以己丑嗣立五十一年己卯崩于漢水穆王滿昭王子以庚辰嗣立五十五年甲戌崩共王繄扈穆王子以乙亥嗣立十二年丙戌崩懿王囏共王子以丁亥嗣立二十五年辛亥崩孝王辟方共王弟以壬子嗣立十五年丙寅崩夷王燮懿王子以丁卯嗣立十六年壬午崩厲王胡夷王子以癸未嗣立三十七年無道為國人所逐出奔彘周召二伯行政謂之共和十五年癸酉崩于彘按史記周召二伯行政謂之共和而竹書紀年以為共伯和攝行天子事宣王立和歸國有至德尊之不喜廢之不怒逍遙得志于共山之首由前言之若後世改元者然由後言之則一人也然考周以甸侯執政者周召而外惟尹氏毛氏諸族若共國則水經注以為即河內共縣國逺而微必無綜攝大權之理前說近之宣王靜厲王子以甲戌嗣立四十六年己未崩幽王宫涅宣王子以庚申嗣立無道十一年庚午為犬戎所弒平王宜臼幽王子以辛未嗣立遷都于洛是為東周五十一年辛酉崩桓王林平王孫以壬戌嗣立二十三年甲申崩莊王他桓王子以乙酉嗣立十五年己亥崩僖王胡齊莊王子以庚子嗣立五年甲辰崩惠王閬僖王子以乙巳嗣立二十五年己巳崩襄王鄭惠王子以庚午嗣立三十二年壬寅崩頃王壬臣襄王子以癸卯嗣立六年戊申崩匡王班頃王子以己酉嗣立六年甲寅崩定王瑜匡王弟以乙卯嗣立二十一年乙亥崩簡王夷定王子以丙子嗣立十四年己丑崩靈王泄心簡王子以庚寅嗣立二十七年丙辰崩景王貴靈王子以丁巳嗣立二十五年辛巳崩悼王猛立為王子朝所弒晉逐子朝立敬王敬王丐景王子以壬午嗣立四十四年乙丑崩元王臣敬王子以丙寅嗣立七年壬申崩貞定王介元王子以癸酉嗣立二十七年庚子崩太子哀王去疾立弟叔弒而代之是為思王尋為其弟少隗所弒考王少隗以辛丑嗣立十五年乙卯崩威烈王午考王子以丙辰嗣立二十四年己卯崩安王驕威烈王子以庚辰嗣立二十六年乙巳崩烈王喜安王子以丙午嗣立七年壬子崩顯王扁烈王弟以癸丑嗣立四十八年庚子崩慎靚王定顯王子以辛丑嗣立六年丙午崩赧王延慎靚王子以丁未嗣立五十九年乙巳為秦所攻盡獻其邑三十六于秦是歲王崩東周君貞定王子河南桓公揭之後東周惠公班之子赧王崩後七年壬子為秦所滅周遂不祀右周三十七世八百六十七年東周君七年秦始皇帝政其先柏翳之後非子封于秦傳二十八世至惠文王始稱王惠文王卒武王立武王卒昭襄王立五十一年滅周又五年卒孝文王立三日卒子楚立是為莊襄王莊襄王二年庚子滅東周以甲寅卒所取吕不韋姬子嗣立為王二十六年庚辰盡滅六國稱始皇帝改周正用十月為歲首三十七年辛卯東巡崩于沙丘二世皇帝胡亥始皇少子以壬辰嗣立是年山東兵起三年甲午為趙髙所弒立其兄子嬰明年沛公入關子嬰降秦滅右秦并天下二世一十五年歷代建元考卷二
