body:
  text: 歴代建元考卷三秀水鍾淵映撰春秋戰國諸侯考魯姬姓侯爵周封元公旦之子伯禽都曲阜魯公伯禽五十二年考公酋四年煬公熙六年幽公宰十四年魏公㵒漢書律厯志作徹公五十二年厲公擢三十七年獻公具三十二年真公濞三十年武公敖九年懿公九年伯御十二年孝公稱二十七年惠公弗湼四十六年隠公姑息入春秋十一年桓公軌十八年莊公同三十二年閔公啓方二年僖公申三十三年文公興十八年宣公倭十八年成公黑肱十八年襄公午三十一年昭公稠三十二年定公宋十五年哀公蔣二十七年悼公寧三十七年元公嘉二十一年穆公顯三十三年共公奮二十二年康公毛九年景公匽二十九年平公旅三十二年湣公賈二十三年頃公讐二十四年為楚所滅右魯凡三十四世八百六十七年起周成王元年丙戌訖秦莊襄王壬子齊姜姓侯爵周以封太公望都營丘太公望丁公伋乙公得癸公慈母哀公不辰胡公静獻公山九年武公夀二十六年厲公無忌文公赤十三年成公説九年莊公購六十四年僖公禄父三十三年襄公諸兒十二年桓公小白四十三年孝公昭十年昭公潘十九年懿公商人四年惠公元十年頃公無野十七年靈公環二十八年莊公光六年景公杵臼五十八年安孺子荼一年悼公陽生四年簡公壬四年平公驁二十五年宣公積五十一年康公貸十九年田和列為諸侯二十六年卒姜氏絶右齊凡二十九世七百四十四年始周武王己卯訖安王壬寅晉姬姓侯爵周成王封其弟虞于唐侯燮徙晉始改曰晉唐叔虞晉侯夑武侯寧族成侯服人厲侯福靖侯宜臼十八年僖侯司徒十八年獻侯籍十一年穆侯弗生二十七年殤叔三年文侯仇三十五年昭侯伯七年孝侯平十五年鄂侯郄六年哀侯光九年小子侯四年翼侯緡二十八年為曲沃武公所滅代有晉國曲沃桓叔成師穆侯子莊伯鱓宋林堯叟春秋世系曰成師之後傳曲沃莊伯莊伯之十一年十一月魯隠公之元年正月也蓋用夏正不唯改元又改厯矣武公稱曲沃莊伯子立曲沃二十三年代晉一年獻公佹諸二十六年惠公夷吾十四年懐公圉一年文公重耳九年襄公讙七年靈公夷臯十四年成公黑臀七年景公孺十九年厲公州蒲八年悼公周十五年平公彪二十六年昭公夷六年頃公去疾十四年定公午三十七年出公鑿十七年哀公驕十八年竹書作敬公幽公柳十八年烈公止二十七年孝公頎十七年竹書作桓公靖公俱酒二年韓魏趙三分其地廢為家人晉遂絶右晉自唐叔至侯緡十七世又武公以後二十一世共七百四十二年起周成王甲午訖安王乙巳秦嬴姓伯爵出自帝顓頊至柏翳賜姓嬴周孝王封翳十九世非子于秦為附庸號秦嬴傳六世襄公以兵救周有功遂列為諸侯秦嬴四十年秦侯十年公伯二年秦仲二十三年莊公四十四年襄公十二年文公五十年寧公十二年出子六年武公二十年徳公二年宣公十二年成公四年穆公任好二十九年康公罃十二年共公和五年桓公榮二十七年景公后四十年哀公三十六年惠公十年悼公十四年共公三十四年躁公十四年懐公四年靈公十三年簡公悼子十六年惠公十三年出公二年獻公師隰二十四年孝公渠梁二十四年惠文王駟十四年稱王更為元年又十四年薨秦本紀惠文君十四年更為元年武王蕩四年昭襄王稷五十六年其五十一年滅周孝文王柱一年莊襄王楚四年薨取吕不韋姬子政立是為始皇并有天下右秦三十世為諸侯五世稱王又稱帝二世而滅共六百九十年起周孝王甲子訖秦二世甲午楚芊姓子爵出自顓頊孫祝融十二世鬻熊事周文王成王封其曾孫熊繹于楚蠻居丹陽熊繹熊艾熊䵣熊勝熊揚熊渠熊摯紅熊延熊勇十年熊嚴十年熊霜六年熊狥二十二年熊咢九年若敖熊儀二十七年霄敖熊坎六年蚡冒熊㫬十七年文王熊貲十三年武王熊通四十四年堵敖熊囏五年成王頵四十年穆王商臣十二年莊王旅二十三年共王審三十一年康王招十五年郟敖麋三年靈王䖍十一年平王居十三年昭王軫二十七年惠王章五十七年簡王中二十四年聲王當六年悼王疑二十七年肅王臧十一年宣王良夫三十年威王商懐王槐三十年頃襄王横考烈王完二十五年幽王煜十年哀王郝王負芻五年為秦所滅滅後十五年而懐王孫心立自民間為楚義帝卒以滅秦右楚四十世二十五世稱王凡八百九十三年始周成王丙戌訖秦始皇戊寅史記楚世家熊渠卒子熊摰紅立而左氏傳夔子對楚人曰我先君熊摰有疾鬼神弗赦而自竄於夔吾是以失楚則摰紅别封於夔不得為楚嗣眀矣春秋三傳唯左氏最後出史遷不及考証也宋子姓公爵周封殷帝乙之元子啓為成湯後微子啓微子衍宋公稽丁公申湣公共煬公熙厲公鮒祀僖公舉二十八年惠公覸三十年哀公元年戴公三十四年武公司空十八年宣公力十九年穆公和九年殤公與夷十年莊公馮十九年閔公捷十年桓公御說三十一年襄公兹父十四年成公王臣十七年昭公杵臼九年文公鮑二十二年共公瑕十三年平公成四十四年元公佐十五年景公頭曼六十四年昭公得四十七年悼公購繇八年休公田二十三年辟公三年竹書作桓公君剔成四十一年康王偃四十七年為齊與楚魏所滅右宋三十二世八百二十八年起周成王戊子訖赧王乙亥衞姬姓侯爵周武王以封同母弟封康叔封康伯牟考伯嗣伯厙伯靖伯員伯頃侯十三年僖侯四十二年共伯餘武公和五十五年莊公揚二十三年桓公完十六年宣公晉十九年惠公朔三年黔牟八年惠公復位二十年懿公赤九年戴公申元年文公燬二十五年成公鄭三十五年穆公遫十一年定公咸十二年獻公衎十三年奔齊殤公剽十一年獻公復位三年襄公惡九年靈公元四十二年出公輒十二年出奔莊公蒯瞶二年出公復位二年奔越悼公黚五年敬公弗十九年昭公糾六年懐公亹十一年慎公頺四十二年聲公訓十一年成侯速二十九年平侯八年嗣君四十二年懐君三十一年元君二十五年君角二十一年秦二世廢為庶人衞祀始絶右衞三十九世九百五年起周武王庚辰訖秦二世壬辰陳媯姓侯爵周封舜後滿以備三恪胡公滿申公犀侯相公臯羊孝公突慎公圉戎幽公宰二十三年僖公孝三十六年武公靈十五年夷公説三年平公燮二十三年文公圉十年桓公鮑三十八年厲公躍七年莊公林七年宣公杵臼四十五年穆公欵十六年共公朔十八年靈公平國十五年成公午三十年哀公溺三十四年卒楚滅陳惠公吳陳滅五年為楚所立在位二十八年懐公柳四年閽公越二十四年為楚滅滅而厲公子完之後執政于齊後卒代有齊國右陳二十三世六百四十四年中絶五年始周武王己卯訖敬王癸亥把姒姓侯爵周封東樓公以為禹後東樓公西樓公題公謀娶公武公四十七年靖公二十三年共公八年惠公十八年成公十八年桓公姑容七十年孝公匄十七年文公益姑十四年平公郁釐十八年悼公成十二年𨼆公乞僖公過十九年閔公維十五年哀公閼路十年出公敕十二年簡公春一年為楚滅右把二十世六百七十九年始周武王己卯訖貞定王丙申宋林堯叟春秋括例曰杜氏年表武公十二年入春秋至僖公二十三年始載把成公卒弟桓公姑容立而考之史記自武公靖公共公徳公至桓公姑容立共九十六年而無成公一代世本譙周索隠徐廣所説又云惠公生成公桓公名有互異又如春秋隠四年伐把桓三年來朝三年會把莊二十五年伯姬歸把並不載何公今但當以左傳所載桓公及杜氏年表為正可也曹姬姓伯爵周武王以封弟振鐸曹叔振鐸太伯脾仲君平宫伯侯孝伯雲夷伯喜三十年幽伯疆九年戴伯蘇三十年惠伯雉三十六年穆公武三年桓公終生五十五年莊公射姑三十一年僖公覊九年昭公班九年共公襄三十五年文公夀二十三年宣公廬十七年成公負芻二十三年武公勝二十年平公須四年悼公午九年靖公露四年伯陽十五年右曹二十三世六百三十六年始周武王己卯訖敬王甲寅按系本及春秋傳悼伯卒弟露立諡靖公而史記世家年表悼之後有聲公名野隠公名通考其年次與傳不合蓋史氏之誤也蔡姬姓侯爵周武王以封弟叔度度作亂遷死周公復封其子胡蔡仲胡蔡伯荒宫侯厲侯武侯夷侯二十八年僖侯肇四十八年共侯興二年戴侯十年宣公考父三十五年桓公封人二十年哀侯獻舞二十年穆公肹二十九年莊公甲午三十四年文公申二十年景公固四十九年靈公般十二年為楚滅平公廬滅三歲復立九年悼公東國三年昭公申二十八年成公朔十九年聲公産十五年元公六年侯齊四年為楚滅右蔡二十四世六百六十二年中絶五年起周成王癸巳訖貞定王甲午鄭姬姓伯爵周宣王以封其弟友桓公友三十六年武公掘突二十七年莊公寤生四十三年厲公突四年出奔昭公復入二年子亹元年鄭子儀十四年厲公復位七年文公㨗四十五年穆公蘭二十二年靈公夷元年襄公堅十八年悼公㵒二年成公㫻十四年僖公髠頑五年簡公嘉三十六年定公寧十三年獻公蠆十三年聲公勝三十七年哀公易八年共公丑三十年幽公巳元年繻公駘二十七年康公乙二十二年為韓所滅右鄭二十三世四百三十二年始周宣王乙未訖烈王丙午燕姬姓侯爵周武王以封召公奭自公已下九世至惠侯召康公奭惠侯召公第九世僖侯三十六年頃侯二十四年哀侯二年鄭侯三十六年穆公十八年宣公十三年桓公七年莊公三十三年襄公四十年桓公十六年宣公十五年昭公十二年武公十九年文公六年懿公四年簡公􅍁四年悼公七年共公五年平公十九年惠公二年獻公二十八年孝公十五年成公載十六年閔公三十一年僖公三十年桓公十一年文公二十九年易王十二年王噲三年為楚滅昭王平復立三十三年惠王七年武成王十四年孝王三年王喜三十三年為秦滅右燕自召康公下九世至惠侯惠侯至亡三十五世七世稱王通前九百一年始周武王己卯訖秦始皇己卯按春秋左傳昭公三年北燕伯欵出奔齊是為簡公而史記以奔齊者為惠公序簡公于平公之後誤矣吳姬姓子爵周太王長子泰伯逃于勾吳荆蠻立為君後武王因而封之太伯仲雍季簡叔達周章熊遂柯相疆鳩夷餘撟疑吾柯盧周繇屈羽夷吾禽處君轉頗髙句卑去齊王夀夢乘二十五年王諸樊遏十三年王餘祭十七年王餘昧四年王僚十三年王闔廬光十九年王夫差二十三年為越滅右吳二十五世七世稱王七百二十餘年始殷祖甲末訖周元王戊辰越姒姓子爵夏少康少子無餘封于會稽奉禹之祀傳二十餘世至允常王允常王菼執句踐王鼫與鹿郢王肓姑不夀王朱勾翁王翳王莽安初無余王菼蠋卯無顓王無疆為椘威王所滅右越自允常至無疆凡八世通前共一千七百二十四年始夏后杼甲辰訖周顯王丁亥按史記王翳之後有王之侯王無疆而竹書安王二十六年於越太子諸咎弑其君翳十月越人殺諸咎越滑吳人立孚錯支為君烈王元年大夫寺區定越亂立初無余是為莽安顯王四年於越寺區弟思弑其君莽安次無顓立十二年於越子無顓卒是為菼蠋卯次無疆立較史所紀世次為詳今從之趙嬴姓其先趙夙造父七世孫顯于晉生共孟共孟生衰衰生宣孟盾為正卿傳莊子朔文子武景子成簡子鞅至襄子無䘏滅知氏分晉國歴桓子嘉獻子浣浣卒子籍立六年周命為諸侯烈侯籍九年武侯十三年敬侯章十二年成侯種二十五年肅侯語二十四年武靈王雍二十七年惠文王何三十五年孝成王丹二十一年悼襄王偃九年幽繆王遷八年為秦滅代王嘉趙亡立于代七年為秦滅右趙自烈侯後十一世稱王六世一百八十二年始周威烈王戊寅訖秦始皇己卯魏與周同姓其先畢公髙之裔萬事晉封于魏生武子犨傳莊子絳至獻子舒為正卿歴襄子曼多及桓子駒遂與韓趙共滅知氏分晉國駒卒孫斯立二十三年周命為諸侯文侯斯三十八年武侯擊十六年惠王罃三十六年改元稱一年後十七年薨竹書顯王三十四年魏惠成王三十六年改元稱一年通鑑考異曰史記魏世家云惠王三十六年卒子襄王立襄王十六年卒子哀王立哀王二十三年卒子昭王立六國表惠王元辛亥終丙戌襄王元丁亥終壬寅哀王元癸卯終乙丑按杜預春秋後序曰太康初汲縣有𤼵舊冡者大得古書其紀年篇起自夏殷周皆三代王事無諸國别也惟特記晉國起自殤叔次文侯昭侯以至曲沃莊伯皆用夏正編年相次晉國滅獨記魏事下至魏哀王之二十年蓋魏國之史記也哀王于史記襄王之子惠王之孫也古書紀年篇惠王三十六年改元從一年始至十六年而稱惠成王卒即惠王也疑史記誤分惠成之世以為後王年也哀王二十三年乃卒故特不稱諡謂之今王裴駰魏世家注引和嶠云紀年起自黄帝終于魏之今王今王者魏惠成王子按太史書惠成王但言惠王惠王子襄王襄王子哀王惠王三十六年卒襄王立十六年卒并惠襄為五十二年今按古文惠成王立三十六年改元後十七年卒太史公書為誤分惠成之世以為二王之年數也世本惠王生襄王而無哀王然則今王者魏襄王也彼既魏史所書魏事必得其真今從之愚按秦本紀惠文君十四年更為元年史家書為改元之始然秦之改元在周顯王四十五年而魏惠成王三十六年則顯王之三十四年也魏實先秦改元矣説者謂改元始于漢文夏時正于孝武乃周室之東曲沃莊伯已用夏正而秦魏二國俱嘗改元固不待新垣平之詐與兒寛輩之議也襄王赫二十三年昭王遫十九年安釐王圉三十四年景湣王增十五年王假三年為秦所滅右魏自文侯至亡凡八世六世稱王一百七十九年始周威烈王戊寅訖秦始皇丙子韓姬姓晉曲沃桓叔庶子萬封于韓曰韓氏生簡簡生子輿至獻子為正卿傳宣子起貞子頃簡子不信莊子庚至康子虎與趙魏滅知氏分晉國傳武子啓章卒子䖍立六年周命為諸侯景侯䖍九年烈侯取十三年文侯十年哀侯六年懿侯昭侯二十六年宣惠王二十一年襄王倉十六年釐王咎二十三年桓惠王三十四年王安九年為秦所滅右韓自景侯後十一世五世稱王一百七十四年始周威烈王戊寅訖秦始皇辛未齊田氏出自帝舜其先陳厲公之子完事齊諡敬仲六世至成子恒專齊政傳襄子盤莊子白至和代齊周命為諸侯竹書紀年曰莊子卒明年立悼子悼子卒乃次立和太公和二年桓公午六年威王因齊三十六年宣王辟疆十九年湣王地四十年襄王法章十九年王建四十四年為秦所滅右齊田氏凡七世五世稱王二百六十六年始周顯王乙未訖秦始皇庚辰愚按周室封建多至千八百國見于春秋者百餘國而已威烈以後存者無幾太史公作史記表春秋者十二表戰國者六因采其有年可譜者附之前編若滕薛莒邾之屬傳次無聞悉略而弗錄焉秦楚之際帝王考楚𨼆王陳勝字涉陽城人以秦二世元年七月起兵于蘄入陳自立為王明年臘月為其御莊賈所殺王景駒以秦二世二年端月為秦嘉所立四月與項梁戰敗走死義帝心故楚懐王孫以秦二世二年癸巳六月為項梁所立稱楚懐王都盱台遷彭城乙未秦亡諸侯尊為帝二月徙都郴項羽遣人弑于江中趙王武臣陳人為陳王畧趙地自立為王凡四月為李良所殺王趙歇故趙王後武臣死為張耳陳餘所立居信都項羽以其地封張耳徙為代王未幾陳餘逐耳迎還王趙立餘為代王明年冬十月為漢韓信所滅齊王儋狄人故齊王族以秦二世二年起兵自立為王舉兵救魏為章邯所殺王假故齊王建之弟為齊人所立儋從弟榮擊之假亡走楚漢二年項羽破田榮復立為齊王敗歸為羽所殺王市故王儋子田榮既逐假立市為王明年項羽徙王膠東都即墨為田榮所殺王都齊將將兵從項羽元年一月羽立為齊王都臨淄為田榮所距亡走入楚王榮儋從弟以漢元年六月擊殺膠東王市自立為王明年春正月為項羽所敗走死王廣故王榮子榮死榮弟横立為王明年為漢韓信所虜王横榮之弟廣死自立為齊王敗歸彭越漢定天下亡入海島中遣使招之將至洛陽自剄死燕王韓廣以秦二世元年為趙王武臣略燕地自立為王漢元年項羽徙王遼東都無終為臧荼所殺王臧荼故燕將將兵從項羽元年一月羽立為王都薊後屬漢四年九月以叛漢誅魏王咎故魏公子甯陵君以秦二世元年九月陳涉立為王明年為秦將章邯所攻自殺王豹故王咎之弟楚懐王立為王立三年項羽徙為西魏王都平陽明年屬漢尋背漢被虜韓王成故韓公子横陽君以秦二世二年六月為項梁所立羽既定天下仍故都陽翟以無功不遣之國廢為穰侯殺之王鄭昌故吳令乙未八月項羽立為王以距漢二年十月昌降漢漢更立故韓襄王孽孫信為王服屬漢西楚霸王項籍字羽下相人故楚將之後與從父梁舉兵于吳破秦鉅鹿下乙未元年一月分天下王諸將自立為王王梁楚地九郡都彭城四年十二月為漢所滅雍王章邯故秦降將元年一月項羽立為王王咸陽以西都廢丘七月與漢戰敗走廢丘二年五月廢丘降漢自殺塞王司馬欣故秦長史元年一月羽立為王王咸陽以東至河都櫟陽七月降于漢後復亡從楚楚兵敗自剄死翟王董翳故秦都尉勸章邯降楚元年一月羽立為王王上郡都髙奴元年七月降于漢後復亡從楚楚兵敗自剄死河南王申陽瑕丘人初事張耳先下河南迎楚元年一月立為王都洛陽九月降于漢殷王司馬卭趙將定河内數有功元年一月羽立為王王河内都朝歌明年為漢所虜常山景王張耳大梁人為趙王歇相元年一月羽立為王王趙地都襄國為陳餘所逐走歸漢漢破趙立耳為趙王薨諡景子敖嗣王九江王英布六人為楚將常冠軍元年一月羽立為王都六後降從漢漢定天下封淮南王以反誅衡山文王吳芮故番君率百越佐諸侯從入關元年一月羽立為王都邾漢定天下改王長沙元年薨子成王臣立八年薨子哀王回立七年薨子恭王右立九年薨子靖王著立二十一年薨無後國除臨江王共敖事義帝為柱國擊南郡有功元年一月羽立為王都江陵三年七月薨王尉王敖子嗣立二年十二月為漢所虜濟北王田安故齊王建孫以濟北數城下楚元年一月羽立為王都博陽六月為田榮所殺右雍王邯以下俱西楚所封與前代王歇膠東王市齊王都遼東王廣燕王臧荼西魏王豹韓王成并漢為十八王至韓王鄭昌則漢定三秦之後羽立以距漢者非始封也又按楚封十八王俱以始封之月為一月乙未之春正月也髙祖初稱亦同見漢書年表後始襲用秦朔故垓下之役為髙五年十二月實項四年十二月也漢所用者秦厯而項則夏時耳歴代建元考卷三
