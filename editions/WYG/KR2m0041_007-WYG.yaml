body:
  text: 歴代建元考卷七秀水鍾淵映撰唐末諸國考後梁朱氏太祖神武元聖孝皇帝晃本名温單州碭山人棄黄巢降唐賜名全忠進封梁王以天祐四年丁卯簒位于大梁己巳遷洛陽六年壬申為子友珪所弑改元二開平四乾化二郢王友珪晃子以壬申弑父自立明年癸酉均王友貞討誅之偽元一鳳厯均王瑱原名友貞晃子以癸酉討逆嗣立于大梁癸未唐兵入汴為其下所殺在位十一年復稱乾化三年四年改元二貞明六龍徳三右後梁二世十七年後唐李氏太祖武皇帝克用本姓朱邪其先沙陀部人賜姓李氏唐末以討黄巢功為太原節度使封晉王朱氏簒立鄰道勸之稱帝不從以天祐五年戊辰薨莊宗光聖神閔孝皇帝存勗太祖武帝克用長子以天祐五年戊辰嗣晉王位仍天祐正朔癸未即皇帝位紹唐正統自將滅梁都洛陽四年丙戌兵亂中流矢崩改元一同光四天祐八年盧龍節度使燕王劉守光自稱大燕皇帝後二年晉王拔幽州執守光以歸殺之改元一應天明宗聖徳和武欽孝皇帝亶本名嗣源代北人太祖養為子同光三年為鄴都亂兵所立丙戌入洛嗣位八年癸巳崩改元二天成四光元年即同四年長興四閔帝從厚明宗第三子封宋王以癸巳嗣立甲午潞王兵入出奔遇弑改元一應順胡三省通鑑注曰取應天順人為義非繼體之君所以紀元也潞王從珂本姓王氏明宗養為子以甲午廢閔帝自立在位三年丙申石敬瑭兵逼自焚殂改元一清泰右後唐四主十四年前奉天祐十七年後晉石氏髙祖聖文章武明徳孝皇帝敬瑭太原人丙申以北京留守舉兵反契丹立為帝都大梁在位七年壬寅殂改元一天福齊王重貴敬瑭從子以壬寅嗣立丙午契丹入大梁北遷後卒于黄龍府仍稱天福二改元一開運右後晉二主共十一年後漢劉氏髙祖睿文聖武昭肅孝皇帝暠本名知逺太原人契丹入中國以丁未即位于晉陽入都于大梁二年戊申殂仍稱天福二改元一乾祐漢紀知逺初即位自言未忍改晉又惡開運之號乃改稱天福十二年五代帝紀曰嗚呼人君即位稱元年常事爾古不以為重也孔子未修春秋其前固已如此雖暴君昏主庸妄之史其紀事先後逺近莫不以歲月一二數之乃理之自然也其謂一為元亦未嘗有法蓋古人之語爾及後世曲學之士始謂孔子書元年為春秋大法遂以改元為重事自漢以後又明年以建元為正偽紛雜稱號遂多不勝其紀也五代亂世也其事無法而不合于理者多矣皆不足道也至其年號乖錯以惑後世則不可以不明初梁太祖以乾化二年遇弑明年末帝已誅友珪黜其鳳厯之號復稱乾化三年尚為有説至漢髙祖建國黜晉出帝開運四年復稱天福十二年者何哉蓋以其愛憎之私耳方出帝時漢髙祖居太原常憤憤下視晉而晉亦陽優禮之幸而未見其隙及契丹滅晉漢未嘗有救難之意出帝北遷方陽以兵聲言追之至關而還及其即位改元而黜開運之號則其用心可知矣蓋其于出帝無復君臣之義而幸禍以為利者其素志也可勝嘆哉夫所謂有諸中必形于外者其見于是乎隠帝承祐髙祖第三子封周王以戊申嗣立在位二年庚戌郭威犯闕遇弑仍稱乾祐二年三年不改元右後漢二主四年北漢世祖神武皇帝旻本名崇髙祖弟郭威簒立以辛亥即帝位于晉陽甲寅殂在位四年不改元仍稱乾祐自四年至七年孝和皇帝鈞本名承鈞世祖長子以乾祐七年甲寅嗣立在位十四年戊辰殂仍稱乾祐二八年九年改元一天㑹彭城王繼元孝和帝養子戊辰孝和殂養子繼恩立供奉官侯覇榮弑之繼元嗣立在位十一年己卯降于宋太宗仍稱天㑹四自十三年至十六年改元一廣運考異曰劉恕云世宗實錄薛史帝紀僭偽傳皆云顯徳二年十二月劉崇卒大定録云顯徳二年春是病死紀年通譜顯徳二年崇之乾祐八年冬崇死顯徳丙辰三年承鈞改元天㑹戊辰開寶元年承鈞之天㑹十三年死開寶十一年繼元改元廣運興國四年繼元之廣運十一年也河東劉氏有國全無紀録惟其舊臣中書舍人直翰林院王保衡歸朝後所纂晉陽偽闕見聞要錄云甲寅年春南伐敗歸夏周師攻國都旻積憂勞成心病是冬卒丁巳年正月鈞改乾祐十年為天㑹元年又云鈞丙戌年二十九承位年四十三卒右諫議大夫陽夢申奉勅撰大漢都統進封定王劉繼顒神道碑云天㑹十二年實皇帝踐阼之初年也十七年繼顒卒末題廣運元年歲次甲戌九月丙午朔今按周廣順元年辛亥旻即帝位稱乾祐四年顯徳元年甲寅旻之乾祐七年也旻卒鈞改元顯徳四年丁巳鈞改乾祐十年為天㑹元年宋開寶元年戊辰鈞之十二年也鈞卒繼元立開寶七年甲戌繼元改天㑹十八年為廣運元年據厯是歲九月丙午朔興國四年己卯繼元亡廣運六年也鈞以唐天成元年丙戌生至顯徳元年甲寅嗣位乃二十九歲矣鈞及繼元踰年未改元蓋孟蜀二主漢隠帝周世宗之比也諸書皆傳聞相因前後相戾惟晉陽見聞録劉繼顒碑歲月最可考證故以為據右漢前二主四年後三主二十八年合三十二年後周郭氏太祖聖神恭肅文武孝皇帝威邢州堯山人辛亥以鄴都留守入汴自立為帝三年癸丑殂改元二廣順二顯徳一世宗睿文孝武皇帝榮本姓柴氏太祖后之姪養為子封晉王以甲寅嗣立在位五年己未殂仍稱顯徳五自二年至六年不改元恭皇帝宗訓世宗子封梁王以己未嗣立庚申禪于宋不改元右後周三世共九年蜀王氏茂附岐王李貞髙祖神武聖文孝徳明惠皇帝建許州舞陽人唐末有兩川封蜀王以天復七年丁卯時唐已改元天祐為梁所簒建仍稱天復七年即皇帝位于成都戊寅殂在位十一年改元五武成三永平五通正一天漢一國以改號漢改元光天一國是年復號蜀順正公衍本名宗衍建少子封鄭王立為太子以戊寅嗣立在位七年乙酉降于唐軍遇害改元二乾徳六咸康一右前蜀二世三十五年建號十八年岐秦忠敬王李茂貞本姓宋名文通深州博野人唐末賜姓名為鳳翔節度使進封岐王唐亡建國號制仍奉唐天祐正朔後唐同光二年改王秦薨吳楊氏太祖武皇帝行宻廬州合肥人唐末有淮南進封吳王以天祐三年薨烈祖景皇帝渥太祖子以天祐三年丙寅嗣稱𢎞農王戊辰張顥徐温遣人弑之在位二年仍稱天祐二四年五年髙祖宣皇帝隆演景帝弟以戊辰嗣稱𢎞農王庚午進封吳王己卯即吳國王位在位十一年仍稱唐天祐九自六年至十五年改元一武義睿皇帝溥宣帝弟以庚辰嗣吳國王位丁亥稱帝在位十六年丁酉禪于南唐尊為讓皇帝明年殂改元四順義六乾貞二太和六天祚三右吳四世四十六年建號十八年南唐烈祖光文肅武孝髙皇帝昇本名知誥吳王恪之後生于徐州仕楊氏封齊王以天祚三年丁酉受禪都金陵在位七年癸卯殂改元一昇元七元宗明道崇徳文宣孝皇帝璟初名景通烈祖長子封齊王以癸卯嗣立戊午改稱國主去年號奉周正朔在位十九年遷南都殂改元三保大十五中興旋改交泰交泰元宗即位未踰年改元太常博士韓熙載上疏曰踰年改元古之制也事不師古弗可以訓時雖可其奏而制書已行竟不能從吳王煜初名從嘉元宗第六子封吳王以辛酉嗣立于金陵在位十三年乙亥降于宋後三年殂唐祀始絶右南唐三主三十九年南漢劉氏髙祖天皇大帝龑本名巖其先上蔡人聖武帝謙之子烈宗襄帝𨼆之弟隠唐末為清海節度使隠卒巖嗣立以丁丑歲稱帝國號越尋改稱漢在位二十三年辛丑殂改元三乾亨八白龍三見以白龍改元大有十四易以筮得大有紀元五代史乾亨九年白龍見南宫三清殿改元白龍又更名龍天門應龍見之祥殤帝玢本名𢎞度髙祖長子封秦王以辛丑嗣立二年癸卯為弟晉王𢎞熙所弑改元一光天光天元年博羅縣妖賊張遇賢自稱中天八國王陷循州後入南唐境敗死偽元一永樂中宗文武光聖明孝皇帝晟本名𢎞熙髙祖封晉王以癸卯弑玢立在位十四年戊午殂改元二應乾旋改乾和乾和十四南越王鋹本名繼興中宗子封衞王以戊午嗣立在位十四年辛未降于宋後數年殂改元一大寶右南漢四主建號五十二年通前烈宗𨼆六十七年閩王氏太祖昭武孝皇帝審知光州固始人唐末其兄潮引兵據福建潮卒審知嗣立梁封閩王以後唐同光三年薨子延翰嗣立稱閩國王為審知養子延禀所殺立延鈞惠宗齊肅明孝皇帝鏻本名延鈞太祖子以丙戌嗣立癸巳稱帝三年乙未為子繼鵬所弑改元二龍啓二永和一康宗聖神英睿文明廣武應道大𢎞孝皇帝昶本名繼鵬惠宗子封福王以乙未自立在位五年己亥為審知少子延羲所弑改元一通文景宗睿文廣武明聖元徳隆道大孝皇帝曦本名延羲太祖少子以己亥弑昶自立在位六年甲辰為其臣朱文進所弑改元一永隆閩景宗即位改元國人相謂曰可謂大昏元年福恭懿王延政太祖子封富沙王以景宗永隆五年癸卯稱帝于建州國號殷明年景宗遇弑乙巳復國號閩尋降南唐遷于金陵改元一天徳三右閩六主五十五年建號十三年後蜀孟氏髙祖文武聖徳英烈明孝皇帝知祥邢州龍岡人以唐同光中守西川長興四年封蜀王甲午稱帝殂改元一明徳楚恭孝王昶本名仁贊髙祖太子以甲午嗣立在位三十一年己丑降于宋至汴殂仍稱明徳三改元一廣政二十八右後蜀二世四十一年建號三十二年吳越武肅王錢鏐杭州臨安人以唐末有兩浙進封越王改王吳梁封吳越王唐進封國王長興三年壬辰薨改元四後臣于中國始不稱年號天寶寶大寶正寶一作保正一作貞廣初通鑑考異曰閻自若唐末泛聞録云同光四年京師亂朝命斷絶鏐遂僭大號改元保正明年唐明宗使命至乃去號復用唐正朔紀年通譜云鏐雖外勤貢奉而隂為僭竊私改年號于其國其後子孫奉中朝正朔慚改元事及錢俶納土凡其境内有石刻偽號者悉使人鑿去之惟西湖落星山塔院中有鏐封此山為落星寶石山偽詔勒之于石雖經鑱毀其文尚可讀後題曰寶正六年歲在辛卯明宗長興二年也其元年即天成元年也好事者或傳曰保正非也余公綽閩王事迹云同光元年梁策錢鏐為尚父來年改寶正元年永隆三年吳越世宗文穆王薨林仁志閩王啓運圖云同光元年梁封浙東尚父為吳越國王尋改元寶正長興三年吳越武肅王崩子世皇嗣永隆二年吳越世皇崩子成宗嗣公綽仁志所紀年歲差繆然可見錢氏改元及廟號故兼載焉至今兩浙民間猶謂錢鏐為錢太祖今參取諸書為據愚案温公通鑑及目錄止載寶正一號而玉海載有天寶寶大寳正廣初四號薛氏甲子㑹紀謂天寶改于戊辰唐天祐三年朱梁之開平二年也寶大改于甲申唐同光二年寶正改于丙戌天成元年也廣初則不辨何歲所改舊武原志載土中得朱府君墓志末題寶大元年歲次甲申其為錢氏所改無疑天寶改元之歲則唐室初亡諸鎮猶稱天祐天復餘則盡禀梁正朔錢氏即夜郎自大烏得遽有年名正史無徵姑書以備考焉文穆王元瓘鏐子以唐長興三年嗣晉天福六年薨忠獻王𢎞佐元瓘子以晉天福六年嗣漢天福十二年薨忠遜王𢎞倧𢎞佐弟以漢天福十二年嗣尋被廢忠懿王俶本名𢎞俶𢎞倧弟以漢天福十二年嗣宋太平興國三年以其地歸宋後數年而薨右吳越五世八十四年楚附武穆王馬殷許州人以唐末有湖南梁封楚王唐封楚國王長興元年薨王希聲殷長子以長興元年嗣三年薨文昭王希範希聲弟以長興三年嗣漢天福十二年薨王希廣希範弟以漢天福十二年嗣乾祐三年為希蕚所殺王希萼希廣庶兄以漢乾祐三年立明年為弟希崇所囚崇自立其將彭師暠廖偃共立希萼為衡山王南唐兵至希萼希崇俱降後南唐不能守劉言王逵周行逢及子保權迭鎮湖南至宋初歸附右楚四世五十六年南平附武信王髙季興本名季昌陜州陜右人以梁初有荆南唐封為南平王後稱臣于吳吳封秦王唐天成三年薨文獻王從誨季興子以唐天成三年嗣漢乾祐元年薨貞懿王保融從誨子以漢乾祐元年嗣宋建隆元年薨弟保朂立三年保朂卒保融子繼冲嗣明年降于宋右南平五世五十七年案楚吳越南平三鎮唯吳越嘗有年號餘俱奉中朝正朔本不録然前史列于十國之内因附載之宋趙氏太祖啓運立極英武睿文神徳聖功至明大孝皇帝匡𦙍其先涿郡人皇考𢎞殷始遷洛陽周顯徳庚申以殿前都檢㸃自陳橋驛還兵受禪在位十七年丙子崩改元三建隆三乾徳五開寶九建隆四年十一月甲子郊祀改元乾徳初太祖將改元諭宰相曰年號須擇前代未有者及蜀平蜀宫人入内見其鏡背有識乾徳四年鑄者學士竇儀曰此必蜀物蜀主王衍曾有此號上嘆曰宰相須用讀書人由是益重儒者歐陽修歸田録竇儀作陶穀太宗至仁應道神功聖徳文武大明廣孝皇帝炅初名光義太祖弟丙子以晉王嗣立在位二十二年丁酉崩改元五太平興國八寶元年即開九年雍熙四端拱二淳化五至道二真宗膺符稽古神功讓徳文明武定章聖元孝皇帝恒初名元侃太宗第三子丁酉以皇太子嗣立在位二十五年壬戌崩改元五咸平六景徳四大中祥符九降以天書改元天禧五乾興元仁宗體天法道極功全徳神文聖武睿哲明孝皇帝禎初名受益真宗太子以壬戌嗣立在位四十二年癸卯崩改元九天聖九明道二景祐四寶元二康定一慶厯八皇祐五至和二嘉祐八歐陽修歸田錄曰仁宗即位改元天聖時章獻明肅太后臨朝稱制議者謂撰號者取天字于文為二人以為二人聖者悦太后爾至九年改元明道又以為明字于文日月並也與二人㫖同無何以犯契丹諱明年遽改曰景祐是時連歲天下大旱改元詔意冀以迎和氣也五年因郊又改元曰寶元自景祐初慕唐𤣥宗羣臣以開元加尊號遂請加景祐于尊號之上至寶元亦然是歲趙元昊以河西叛改姓元氏朝廷惡之遽改元曰康定而不復加于尊號而好事者又曰康定乃謚爾明年又改曰慶厯至九年大旱河北尤甚民死者十八九于是又改元曰皇祐猶景祐也六年日蝕四月朔以為正陽之月自古所忌又改元曰至和三年仁宗不豫久之康復又改元曰嘉祐自天聖至此凡年號九皆有謂也又曰國朝百有餘年年號無過九年者開寶九年改為太平興國太平興國九年改為雍熙大中祥符九年改為天禧慶厯九年改為皇祐嘉祐九年改為治平惟天聖盡九年而十年改為明道英宗體乾膺厯隆功盛徳文肅武睿聖宣孝皇帝曙本名宗實濮安懿王允讓子仁宗立為皇子以癸卯嗣立在位四年丁未崩改元一治平四神宗紹天法古運徳建功英文烈武欽仁聖孝皇帝頊英宗太子以丁未嗣立在位十九年乙丑崩改元二熙寧十元豐八葉夢得石林燕語曰熙寧末年旱詔議改元執政初議大成仁宗曰不可成字于文一人負戈又擬豐亨復曰不可亨字為子不成惟豐字可用改元豐哲宗體元繼道顯徳定功欽文睿武齊聖昭孝皇帝煦初名傭神宗太子以乙丑嗣立在位十四年庚辰崩改元三元祐八紹聖四元符三徽宗體仁合道駿烈遜功聖文仁徳憲慈顯孝皇帝佶神宗第十一子封端王以庚辰嗣立在位二十五年傳位太子丁未金人執以北去髙宗立遙尊為太上皇復九年乙卯崩于五國城改元六建中靖國元崇寧五大觀四政和七重和一宣和七宋史王覿傳徽宗即位改元詔下覿言建中之名雖取皇極然重襲前代紀號非是宜以徳宗為戒陸游老學菴筆記政和末議改元王黼擬用重和既下詔矣范虚間白上曰此契丹號也故未幾復改宣和然重和乃契丹宫殿名猶我之宣徳門也年名則寔曰重熙建中靖國後敵避天祚嫌名追謂重熙曰重和耳不避可也袁氏楓忩小牘道君皇帝改元宣和人或離合其字曰一旦宋亡此與蕭巋離合周宣政為宇文亡日同欽宗恭文順徳仁孝皇帝桓徽宗太子以乙巳受禪立在位二年金人入中原丁未北遷髙宗立遙尊為淵聖皇帝後二十四年庚辰崩于金改元一靖庸二二帝北狩康王在齊州汪伯彦引天命人心為請謂靖康紀元為十一月立康之兆帝曰當更思之髙宗受命中興全功至徳聖神文武昭仁憲孝皇帝構徽宗第九子封康王丁未二帝北狩嗣位于南京後南渡建都臨安在位三十六年壬子傳位太子又二十六年丁未崩改元二建炎四紹興三十二元懿太子旉髙宗子以建炎三年為統制官苗傅劉正彦所立尊髙宗為太上皇尋復位旉後卒改元一明受孝宗紹統同道冠徳昭功哲文神武明聖仁孝皇帝眘初名瑗太祖子秦王徳芳之後髙宗以為子初封建安郡王立為太子以壬午受禪立在位二十七年己酉傳位太子後五年崩改元三隆興二乾道九淳熙十六孝宗内禪擬于傳位日降赦汪應辰言唐太宗受禪于髙祖明年正月始改元乃從其説又議改元重熙應辰謂契丹嘗以紀年遂改隆興宋鄱陽張世南游宦紀聞曰改元始于共和紀號倡于漢武後世遵用之我宋年號無過九年者唯天聖盡九年十年十二月改明道熙寧亦盡十年紹興乃三十二年淳熙亦十六年李心傳建炎以來朝野雜記曰乾道癸巳歲冬至日上祀南郊肆赦改明年元為純熙後六日甲辰中書門下省言若淳化雍熙言之當用淳熙字庶幾仰體主上取法祖宗之意從之光宗循道憲仁明功茂徳温文順武聖哲慈孝皇帝惇孝宗第三子立為太子以己酉受禪立在位五年甲寅皇太后命嘉王擴即位尊帝為上皇後六年崩改元一紹熙寧宗法天備道純徳茂功仁文哲武聖睿恭孝皇帝擴光宗第二子甲寅以太皇太后吳氏命嗣立在位三十一年甲申崩改元四慶元六嘉泰四開禧三嘉定十七李心傳建炎以來朝野雜記曰髙宗即位改元建炎以火徳中微故也苗劉之亂以為炎字乃兩火故多盗明年還自海上改五年為紹興久之既與金議和遂不復改三十二年孝宗即位踰年改隆興其説以為務隆紹興之政及學士草制則合建隆紹興之義非初意矣二年王瞻叔為參知政事言趙諗謀逆欲以隆興改元㑹太常寺丞曾逮檢事實以進上愕然明年正月郊改元乾道乾道盡九年時以為乾元用之九數已極乃改為純熙又易純為淳言欲致淳化雍熙之美也十六年光宗即位將紹淳熙之政遂以紹熙紀元猶隆興意爾學士草制則又合紹興淳熙為義亦非初意也五年上繼統趙子直為相鋭意慶厯元祐故事乃改慶元慶元盡六年而上皇及太后繼崩中宫去世二皇子不育朝廷嫌之因改明年為嘉泰云趙彦衞雲麓漫抄曰名年始于漢武往往皆寓美意或紀一時盛事唐徳宗時思繼先烈蓋欲法貞觀開元也本朝改隆興欲法建隆紹興之義或云趙稔曾用之改乾道又改淳熙詩曰時純熙矣有言純旁作屯不宜用復改淳熙取淳化雍熙紹熙則法紹興淳熙慶元法慶厯元祐開禧則取開寶天禧也昔唐徳宗以貞觀開元之盛慨想前烈改元貞元庶幾二祖本朝因之如近世隆興之用建隆紹興淳熙之用淳化熙寧紹熙之用紹興淳熙慶元之用慶厯元祐開禧之用開寶天禧皆是也珂按吕陶净徳集記曰元祐之政謂元豐之法不便即復嘉祐文法以救之然不可盡變大率新舊二法並用貴其便于民也議者乃云對鈎行法朝士善謔乃云豈獨法令為然至于年號亦得對鈎矣然詼謔之談亦有味珂謂人君法祖存古之意最為盛徳陶言近肆不可以訓又按光宗升祔循故事將建閣以藏宸章侍從集議欲以大謨名當國者以為不馴又欲名天疇疑近天章且天章不入御矣乃名寶謨珂謂寳文乃仁宗閣名如陶之言亦對鈎也方顯謨建閣時國論尚紹述哲宗慕丕承之烈以見善繼若寶謨則直以禹之書首于三謨而言之歴代寶之以為大訓本專指墳典此惟取祕藏之義云相堂岳珂愧郯錄增理宗建道修徳大功復興烈文仁武聖安孝皇帝昀初名貴誠太祖子魏王徳昭後沂靖惠王子甲申史彌逺廢皇子濟王竑奉帝嗣立在位四十年甲子崩改元八寶慶三紹定六端平三嘉熙四淳祐十二寶祐六開慶二景定五王應麟玉海年號頌曰天祐下民藝祖立極繇三而五建隆乾徳開寶之九享國十七太宗之元改為興國八而改之雍熙乃復四而更之端拱乃續麟正二書淳化是易鳳紀五頒至道是革至三而終二十二訖章聖續圖咸平凡六景徳祥符四九其别天禧乾興五六其畢二紀仍期仁皇嗣服天聖明道九二先及景祐寶元康定慶厯皇祐至和嘉祐之日曰四而三曰一而八曰五而二曰八而足四十一年政事修飭英皇和平四載善述神考之興聿新制作熙寧十更元豐八閲哲宗紹休元祐凡八紹聖元符四三其列十有五禩徽皇靖國崇觀政重宣和岌岌總其厯年五加二十靖康之難髙宗正域建炎紹興再立宗祏四與三二紀凡三歴孝廟隆興乾道相襲二九之餘淳熙十六二十七春乾坤清謐光宗五稔紹熙駿烈寧考慶元不更歲律泰禧四三嘉定十七三十年間不遑暇逸晉王承統光增燕翼寶慶三改紹定六易端平嘉熙歴載凡七淳祐十二寶祐歲六開慶一禩景定更瑟度宗端文明武景孝皇帝禥福王子理宗立為太子以甲子嗣立在位十年甲戌崩改元一咸淳十少帝㬎度宗子封建國公以甲戌嗣立二年丙子元人入臨安帝北遷降封瀛國公端宗立遙尊為恭孝懿皇帝後殂于元改元一徳祐端宗裕文昭武愍孝皇帝昰少帝兄封益王以徳祐二年丙子奔閩即位于福州三年戊寅浮海至碙州崩改元一景炎衞王昺少帝弟戊寅羣臣立之于碙州遷居崖山三年己卯張𢎞範兵逼丞相陸秀夫負帝赴海崩國亡改元一祥興右宋自太祖至欽宗九帝一百六十六年南渡九帝一百五十二年共三百十八年起庚申盡己卯附考太宗淳化五年蜀賊李順僭號于成都改姓孟國號大蜀内臣王繼恩等討平之偽元一應運真宗咸平三年益州戍卒王均作亂僭稱大蜀雷有終率兵平之偽元一化順仁宗慶厯七年貝州卒王則據州反自稱東平王國號安陽明年文彦博明鎬討平之偽元一得聖仁宗皇祐元年廣源州蠻儂智髙自稱南天國四年陷邕州僭號仁惠皇帝狄青擊敗之走死改元四大厯端懿景瑞啓厯案智髙改元見于宋史可考者景瑞啓厯也前二號沈氏正閏考書之者未知何據徽宗崇寧年前國子博士趙稔反伏誅偽元一隆興徽宗宣和二年睦州民方臘作亂自稱聖公陷浙東西六州因童貫討平之偽元一永樂髙宗建炎四年鼎州民鍾相作亂自稱楚王孔彦舟執送行在誅之偽元一天載髙宗建炎四年金人立劉豫為大齊皇帝以中原地歸之都汴改明年為元年在位七年為金人所廢以蜀王從臨潢府改封偽元一阜昌髙宗紹興三年湖冦楊么自稱大聖天王後岳飛討平之偽元一庚戌陳萬偽元一天戰李婆備偽元一太平僧王法思偽元一羅平李子揚偽元一龍興李接偽元一羅平廖森偽元一重徳李合茂偽元一正法雷進偽元二正法人知愚按陳萬以下數號俱見玉海蓋盗賊之妄竊者而正史不書失其年次雜載于此歴代建元考卷七
