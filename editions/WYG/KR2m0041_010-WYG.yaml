body:
  text: 歴代建元考卷十秀水鍾淵映撰外國考日本天御中主天材雲尊天八重雲尊天彌聞尊天忍勝尊瞻波尊萬魂尊利刹魂尊國狹搥尊角龔魂尊汲津舟尊面垂見尊國常立尊天鑑尊天萬尊珠名杵尊伊裝諾尊素戔為尊天照太神尊正哉吾勝連目天押穗耳尊天彦尊天炎尊彦瀲尊以上凡二十三世並都于筑紫日向宫神武天皇彦瀲尊第四子以周僖王甲寅即位自筑紫入居太和州橿原宫申叔舟海東諸國紀神武天皇名狹野以周幽王十一年生四十九年戊午入大倭州盡除中洲賊衆五十三年辛酉正月庚申始號天皇在位七十六年夀一百二十七歲綏靖天皇神武天皇第三子在位三十三年安寧天皇綏靖太子在位三十八年懿徳天皇安寧第三子在位三十四年孝昭天皇懿徳太子在位八十三年夀一百十八歲孝安天皇孝昭第二子在位一百有二年夀一百三十七歲孝靈天皇孝安太子在位七十六年夀一百十五歲七十二年壬午秦始皇遣徐福入海求仙福至紀伊州居焉崇神中死而為神孝元天皇孝靈太子在位五十七年夀一百十七歲開化天皇孝元第二子在位六十年夀一百十五歲崇神天皇開化第二子在位六十八年夀一百二十歲垂仁天皇崇神第三子在位九十九年夀一百四十歲景行天皇垂仁第三子在位六十年夀一百有六歲成務天皇景行第四子在位六十一年夀一百十一歲仲哀天皇景行孫在位九年神功天皇開化天皇五世孫息長宿稱女仲哀納為后仲哀歿遂主國事在位六十九年夀一百歲應神天皇仲哀第四子母神功在位四十一年夀一百有十歲仁徳天皇應神第四子應神歿二年無主乃立在位八十七年夀一百有十歲履中天皇仁徳太子在位六年返正天皇仁徳次子在位六年允恭天皇仁徳第三子在位四十三年安康天皇允恭第二子初允恭立太子以性惡殺之立安康安康立殺仁徳之子大草香王而娶其妻為后其子眉輪王殺之在位三年雄畧天王名大泊瀬稚武允恭第四子在位二十三年夀一百有四歲清寧天皇雄畧第三子在位五年飯豐天皇清寧女弟即位是冬歿國人以小楯迎顯宗立之顯宗天皇履中孫在位三年仁賢天皇名大脚顯宗同母兄先是飯豐歿讓位顯宗至是立在位十一年武烈天皇仁賢太子在位八年繼體天皇應仁五世孫立十六年始建年號在位二十五年改元三善化正和發口安間天皇繼體第二子繼體歿二年無主乃立仍用𤼵口紀元在位二年宣化天皇繼體第三子在位四年改元一僧聽欽明天皇一名天國排開廣庭天皇宣化長子以梁髙祖大同八年壬戌立十一年始傳佛法于百濟在位三十二年改元八同要貴樂結清兄弟藏和師安和僧金光敏達天皇一作達海欽明第二子在位十四年改元三賢接元年仍用金光立五年乃改鏡當勝照用明天皇欽明第四子立隋開皇中仍用勝照紀年在位二年崇俊天皇欽明第五子在位五年改元一端政推古天皇欽明孫女敏達納為后至是立在位三十六年改元六從貴頌轉光元定居倭京仁至舒明天皇敏達孫名田村在位十三年改元三聖徳僧要命長皇極天皇敏達曾孫女舒明納為后以壬寅歲立仍用命長紀年在位三年孝徳天皇以唐永徽元年庚戌立在位十年元年仍以命長紀年既而改元二常邑白雉齊明天皇即皇極天皇復位仍用白雉紀元在位七年改元一白鳳天智天皇舒明太子母皇極天皇在位十年仍用白鳳紀年天武天皇舒明第二子名大海人天智欲禪位辭避吉野山大友皇子謀簒將兵討之遂立在位十五年仍用白鳳紀年後改元二朱雀朱鳥持統天皇天智第二女天武納為后因主國事始更號日本仍用朱鳥紀年在位十年改元一太和文武天皇以唐長安元年立改元一大寶阿閉天皇文武天皇子皈依天皇聖武天皇以唐𤣥宗開元中立後自稱太上皇傳位于太子改元二白龜天平孝謙天皇宋史作孝明天皇今從東鑑聖武之女立為太子以唐𤣥宗天寶六年丁亥立改元二太平勝寶太平寶字天炊天皇髙野姬天皇聖武天皇女白璧天皇桓武天皇以唐徳宗建中三年壬戌立改元一延厯諾樂天皇嵯峨天皇淳和天皇光仁天皇宋史作仁明今從東鑑以唐文宗太和四年甲戌立改元一寶龜文徳天皇清和天皇立改元二元慶天長陽成天皇光孝天皇以唐僖宗光啓元年乙巳立仁和天皇醍醐天皇立改元二昌泰延長天慶天皇封上天皇立改元一康保冷泉天皇以宋太祖開寶元年戊辰立後傳其子自稱太上皇改元一安和守平天皇冷泉天皇子以宋太宗雍熙初年立改元一以上凡六十四世永延一條天皇立改元一長徳元年丁未元正天皇立改元一養老元年丁卯朱雀院天皇改元三天慶長厯承闕二條院天皇立改元一長寛三條院天皇後朱雀天皇後冷泉院天皇後朱雀院天皇太子立改元一廣平後一條院天皇立改元一寛仁掘河院天皇立改元一康和白河院天皇立改元一承保深草院天皇烏羽院天皇立改元二元冰元年戊戌保安元年庚子崇徳院天皇立改元一保延長和寛𢎞延久寛和天喜嘉承久夀永保永久永萬大治寛治案日本自御中立至守平天皇宋史所載其國奝然所記者世次最詳一條天皇而下先後莫考今但據其見于東鑑者書之長和以下十三號并未詳何主所改矣仁平應保天元永然天厯以上玉海所載案玉海又有天慶延厯永延文治寛𢎞永厯大寶諸號俱巳見東鑑中乆安治象宋周宻癸辛雜識嘉定乙亥楊和王墳菴中有日本僧定心藏日本度牒其年紀久安保安治象等號唯保安見東鑑餘二號未詳年代附見於此髙倉院天皇在位四十年以辛丑禪位于太子自稱太上皇改元七永厯正厯承安保元平治安元治承安徳天皇言仁髙倉院第一皇子以治承五年辛丑即位癸卯新主踐阼文治三年丙午以平民作亂歿于海改元二養和夀永後鳥羽院天皇尊成髙倉院第四皇子以夀永二年癸卯踐阼建九年乙卯脱屣稱主元應年乙亥崩改元三元厯文治玉海或曰治様建久上御門院天皇為人後鳥羽院第一皇子以建久九年乙卯即位承元四年庚午脱屣稱上皇至寛喜三年辛卯崩改元五正治建仁元久建永承元順徳院天皇守城後鳥羽院第四皇子正治二年立為太子以承元四年庚午即位承久三年辛巳脱屣稱上皇癸未崩改元三建厯建保承久後掘河院天皇髙倉院第二守貞親王御子以承久四年壬午即位去前天照大神尊八十五代醍醐天皇二十四代改元八貞應元仁嘉禄安貞寛喜貞永天福文厯四條院天皇後掘河天皇子以文厯二年乙未即位改元四嘉貞厯日延應仁治後嵯峨院天皇邦仁上御門院第二皇子以仁治四年癸卯即位寛元四年丙午脱屣文永九年崩改元一寛元後深草院天皇久仁後嵯峨院第一皇子寛元元年立為太子四年丙午即位正元元年脱屣稱上皇改元四建長康元正嘉正元龜山院天皇恒仁後嵯峨院第三王子正嘉二年立為太子正元元年甲戌即位文永十一年脱屣改元三文應文永建治以下未詳何主所改正應延慶𢎞安正安嘉元應長正和元徳元𢎞嘉厯以上東鑑所載自髙倉院治承四年庚子訖文永三年丙寅凡九十四年世次可考其自文永以後可見者唯數號而已又其書所紀多關東國將軍之事不詳本國未知當中原何代然夀永二年癸卯令大宋國陳和卿鑄佛其中又云聖武天皇至安徳天皇時四百餘歲考聖武當唐開元中立以意推之盖中朝南渡以後也續考乙丑日本國改元永鎮明孝宗𢎞治十八年正徳七年壬申日本入貢武進陳端甫為南京禮部司務時值宴勞來使問其國號乃是永鎮八年癸酉日本國改元天政明神宗萬厯元年壬辰日本國改元文禄萬厯二十年乙未日本國改元慶長見東鑑序壬戌日本國改元寛永見東鑑序紅夷紅夷在東南海外不知其傳次明熹宗天啓五年三月入犯浙江沿海敗去其改元可考者一寛和大理蒙氏髙祖細奴羅其先世為渠帥以唐太宗貞觀三年己丑伐昆彌張氏有國國號南詔唐授魏州刺史卒世祖羅晟細奴羅子以唐髙宗上元元年甲戌嗣立至唐睿宗末卒威成王羅晟皮羅晟子以唐𤣥宗先天元年壬子嗣立至開元中卒雲南王皮羅閣羅晟皮子以唐開元十六年戊辰嗣立唐封為雲南王賜名歸義始合南詔為一盡有雲南地神武王閣羅鳳皮羅閣子以唐天寶八年己丑嗣立始叛唐改國號曰大蒙吐蕃封為東帝改元二贊普鐘長夀舊唐書閣羅鳳臣吐蕃吐蕃令閣羅鳳為贊普鐘號曰東帝結以金印蠻謂弟為鐘楊慎滇載記以為改元贊普鐘豈即吐蕃之偽稱以為紀年之號耶俟博雅者詳焉孝恒王異牟尋閣羅鳳之子以唐代宗大厯十四年己未嗣立改國號曰大理自稱日東王僭封五嶽四瀆改元二見龍上元孝文王尋閣勸異牟尋子以唐徳宗貞元十五年己卯嗣立順帝永貞元年乙酉卒改元一應道幽王勸龍晟尋閣勸子以唐順宗永貞元年乙酉嗣立為其臣嵳顛所殺改元一龍興靖王勸利晟勸龍晟弟以唐憲宗元和元年丙戌為嵳顛所立改元一全義昭成王晟豐祐勸利晟子以唐穆宗長慶四年甲辰嗣位以武宗會昌末年卒改元二保和天啓景莊帝世隆晟豐祐子始自稱皇帝改號大禮國冦唐安南西川後冦越巂卒于景浄寺改元二建極一作建樞法堯見正閏考宣武帝隆舜一名法世隆子以唐僖宗乾符四年丁酉嗣立為豎臣楊登所弑改元二貞明承智大同見通鑑真載記但曰貞明嵯耶孝哀帝舜化真隆舜子以唐昭宗乾寧四年丁巳立光化四年為其臣鄭買嗣所篡蒙氏遂亡化真改元一中興右大理蒙氏十三世二百五十年長和鄭氏徳桓帝買嗣本唐鄭回之後世為其國清平官以唐昭宗光化五年壬戌立改國曰大長和卒改元一安國肅文帝旻買嗣子以梁開平中嗣立卒改元六始元天瑞景星安和貞祐初厯孝治見正閏考隆亶旻之子旻卒嗣立未幾為其臣東川節度使楊千真所弑鄭氏遂亡隆亶改元一天應右長和鄭氏三世二十六年趙善政其國清平官以後唐明宗天成三年戊子為楊千真所立改國號曰大天興僅十月復為楊千真所奪改元一興源楊千真既立改國號曰大義寧二年為通海節度使段思明所討走死改元二尊聖大明見正閏考大理段氏太祖思平其先武威郡人始祖儉魏佐蒙氏為清平官六傳至思平官通海節度使以後晉天福二年丁酉討楊氏得國改國號曰大理改元二文徳神武見正閏考思英太祖子嗣立未幾卒私謚文經武畧皇帝思良思英叔以後晉開運三年丙午立改元一致治思璁以後周廣順三年癸丑立改元三明徳廣徳聖徳一作興聖應道帝素順以宋太祖建隆四年癸亥立在位二十一年卒改元一明正昭明帝素英以宋太宗雍熙二年乙酉立在位二十四年卒改元五廣明明應明聖明徳明治玉海作明統敬明帝素亷以宋真宗大中祥符二年己酉立在位九年避位為僧卒改元一明通天聖聖徳帝素貞以宋仁宗天聖四年丙寅立在位十五年卒改元一正治素興以宋仁宗慶厯元年辛巳立以無道為國人所廢改元二聖明天明世宗思亷以宋仁宗慶厯四年甲申為國人所立在位三十一年卒改元三保安政安政徳連義以宋仁宗熙寧八年己卯立為其臣楊義貞所弑改元二上徳廣安楊義貞簒立四年段氏臣岳侯髙智昇遣子昇泰起東方兵討滅之復立段氏夀光連義從子為髙智昇所立在位二年改元一上明正明世宗思亷庶孫以宋神宗元豐五年壬戌立避位為僧國人遂奉善闡侯髙昇泰為主段氏中絶正明改元三保立建安天祐大中國主髙昇泰以宋哲宗元符二年己卯為國人所立改國號曰大中臨歿戒其子太明復奉段氏太明遂求段氏餘子正淳立之而世相其國昇泰改元一上治中宗正淳段氏宗室為髙太明所立是為後理國在位三十年傳位于子避位為僧卒改元三天授開明文安憲宗正嚴以宋徽宗大觀二年己丑嗣立在位四十年避位為僧卒改元四日新永嘉保天廣運景宗正興以宋髙宗紹興十七年丁卯嗣立後避位為僧卒改元四永真大寶龍興盛明一作建徳宋王應麟玉海又有崇興大寶盖龍興大保之訛也今正之宣宗智興以宋孝宗朝道八年癸巳嗣立在位二十七年卒改元五利貞盛徳嘉㑹元亨安定亨大帝智連以宋寧宗慶元六年庚申嗣立在位三年卒改元一鳳厯神宗智詳智連弟以宋寧宗開禧元年乙丑立在位三十三年卒改元一天開仁夀孝義帝祥興以宋理宗嘉熙三年己亥立在位十二年卒改元一道隆興智以宋理宗淳祐十一年辛亥立壬子歲元憲宗遣其弟呼必賚來伐其臣髙太祥拒戰死興智被俘段氏亡後元以興智為總管傳十二世訖元亡乃絶興智改元一天定右大理段氏二十二主三百一十五年起丁酉盡壬子自把自把國本西南蠻在廣西邕州化外北與大理接宋淳熙三年其王阿謝立改元一見宋知邕州吳儆劄子乾貞交趾丁氏案交趾本中國地唐曰安南都䕶府五代時服屬南漢至丁部領始自建國大勝王丁部領以讙州刺史討平管内之亂因自立為大勝王傳位于其子璉卒交趾郡王璉部領子南漢節度使宋初内附為交趾郡王卒交趾郡王璿璉幼弟嗣立未幾為大校黎桓所簒右交趾丁氏三世十三年交趾黎氏南越王桓本丁氏大校以宋太平興國初得國封交趾郡王進封南平以真宗咸平九年卒子龍廷弑兄龍鉞自立交趾郡王至忠本名龍廷以宋真宗咸平九年丙午自立至大中祥符三年庚戌為其將李公蘊所簒右交趾黎氏二世三十二年始宋太平興國元年訖大中祥符三年案丁氏黎氏前史並云建國改元今無可考但以其安南建國所由始因備載之安南李氏太祖公藴本黎氏大校以宋真宗大中祥符三年庚戌得國立十九年戊辰卒孫日尊私諡為神武皇帝王徳政公藴子以宋仁宗天聖戊辰嗣立二十七年乙未卒王日尊徳政子以宋仁宗至和二年乙未嗣位建國號曰大越自稱法天應運崇仁至道慶成龍祥英武睿文尊徳聖武皇帝凡十七年卒改元二寶象神武案玉海又載有天貺寶象一號愚謂日尊既謂寶象必不更益二字以紀年或前史省文刪去天貺二字則未可知也神王乾徳日尊子以宋神宗熙寧五年壬子嗣立在位五十六年壬子卒改元二彰聖嘉慶泰寜王陽煥乾徳子以宋髙宗紹興二年壬子嗣立在位六年戊午卒王天祚陽煥子以宋紹興八年戊午嗣立在位三十七年卒案交趾其王初立封交趾郡王進封南平卒贈南越王至是天祚立竟封安南國王遂為故事王龍􅩾天祚子以宋孝宗淳熙三年丙申嗣立在位三十五年壬申卒王昊旵龍􅩾子以宋寧宗嘉定五年壬申嗣立後卒無子女昭聖主國事紹定二年禪位于夫陳日照李氏遂絶右安南李氏八世共二百二十餘年始宋大中祥符三年訖宋紹定二年安南陳氏太王日照其國愚多鄉人或云姓謝福建長樂人尚李氏女以宋紹定二年得國宋封安南國王自稱大越皇帝元兵來伐戊子𫝊位于子光昺宋封為太王卒聖王光昺一名威晃日照子宋封為安南國王元因而封之在位二十年卒改元一紹隆仁王日烜光昺子以丁丑嗣立自稱憲天體道大明光孝皇帝傳位于子日燇自稱太上皇後為僧卒至元十四年光昺卒日烜立英王日燇日烜子嗣位後元兵兩伐之不克而退卒改元一紹寶安南國忠懿王益稷本國封昭國王元兵南伐歸附俾以王爵居鄂州明王日套日燇子嗣位後禪其子日曠憲王日曠日㷃庶長子嗣位後明王立其弟禄星裕王日煃一名禄星日曠嫡弟嗣立明封安南國王卒恭肅王之子嗣是為昏徳公昏徳公日熞裕王兄子嗣立無道為明王第三子太師叔明所廢幽殺之叔明攝位案黎澄南翁夢録裕王薨其兄恭肅之子立是為昏徳公為藝王所廢而實錄及安南傳俱云日爌卒子日㷆立日㷆卒日煃嗣立日煃卒弟日熞嗣為其兄叔明所殺與所紀不同盖安南别立偽名以通中國或傳聞之訛而黎氏世仕其國當不謬也澄即偽大虞上皇子封衞國大王入中朝仕至工部尚書藝王叔明明王第三子立朞年遜位其弟日煓至順王七年甲戌卒時中朝洪武二十七年睿王日煓日熞弟為叔明所立三年伐占城卒叔明復立其子日煒靈徳公日煒一名睨嗣立後無道為叔明所廢順王日焜一名顒嗣立為黎季􅀢所弑王曉順王子黎季􅀢立之旋被弑復立其幼子􅀢尋又弑之而自立陳氏遂亡日曉改元一光泰右安南陳氏十二世一百七十年始宋紹定二年訖明建文元年黎季􅬚以明洪武末簒陳氏易姓名胡一元自謂舜裔稱大虞太上皇以位授其子蒼改名􅐏僣稱皇帝中朝建文元年立􅐏為安南國王永樂五年大兵南討俱俘于京師凡改元四天成聖元紹成一作紹聖開大俱見討安南檄簡定陳氏故臣以明永樂六年舉兵作亂稱日南王偽稱陳氏裔尋立從子季曠為大越皇帝自為上皇明兵討擒之定改元一興慶陳季擴簡定從子稱大越皇帝永樂十二年明兵俘以歸誅之季擴改元一重光續文獻通考作慶元非安南黎氏太祖利本清化土官以明成祖永樂十六年戊戌起兵稱平定王宣宗宣徳二年據有安南六年辛亥冊為權署國事八年癸丑卒私諡髙皇帝改元一順天太宗麟一名龍以甲寅嗣立正統中卒私諡文皇帝改元二紹平大寶濬一名隆基麟之子以正統中嗣立天順三年己卯為庶兄琮所弑改元一太和琮濬庶兄一名宜民弑濬自立其臣黎夀域等起兵殺之改元一天興聖宗灝一名思誠濬之弟天順中為國人所立孝宗𢎞治十年丁巳卒私諡淳皇帝改元一光順暉一名鏳灝之子以丁巳嗣立甲子卒改元一景統肅宗敬暉之子立未踰年而卒改元一泰貞厲愍王誼敬之弟以𢎞治末嗣立四年為其臣阮种等所弑後譓立追諡為威帝改元一端慶靈隠王晭一名瀅灝之孫錦江王玿之子嗣立追諡父為徳宗建皇帝以正徳丙子為陳暠所弑後懬立更諡為襄翼帝改元一洪順陳暠一名立孫為其國諒山都將與子昺昇攻陷安邦弑主自立國人討之退據諒山死改元一天應案王氏安南志晭為鄭綏鄭惟鏟所殺續通鑑則以為陳暠然其登庸赴于中朝曰前國王黎晭為暠所害鄭氏既奉黎寧與莫氏為難登庸不應反為之諱今正之譓一名掎晭兄灝之子嗣封它陽王為國人所立諡其父為哲宗明皇帝後莫登庸作亂奔清華以嘉靖九年庚寅卒于老撾改元一光紹于文定筆塵作光照以為黎寧所改今從續文獻通考及王氏安南志懬譓之弟譓奔清華以明世宗嘉靖元年壬申為莫登庸所立尋被酖卒偽諡恭皇帝改元一統元寧譓之子譓卒國人奉之為世孫嘉靖十三年甲午故臣萬勝侯鄭惟􅉄等共立之居清化之木州漆馬江改元一元和案黎氏之後朝廷令居漆馬江禁莫氏不得侵害後寧卒舊臣鄭蕳立其子寵于西都寵無嗣復立暉四世孫維邦傳次子維潭起兵攻殺莫茂洽復有安南神宗萬厯二十四年丙申詔以為都統使自後維潭卒子維新立維新卒子維祺立其赴于中朝曰安南都統使寔帝其國中自若也安南莫氏莫登庸安南之荆門人仕黎氏累官太傅仁國公進封興安王遂弑懬自立為大越皇帝三年自稱太上皇明兵討之降為安南都統使卒登庸改元一大正案登庸以嘉靖二十年辛丑降授都統使時方瀛巳先卒傳其孫福海浤翼茂洽三世茂洽復為黎維潭所殺明令敬用居髙平如黎氏漆馬江故事今尚存附錄蜀紀萬通蠶叢帝愚案改元始于漢武蠶叢開蜀實在洪荒之初烏得遽有年名盖蜀紀之誕也道經延康赤明龍漢開皇上皇無極永夀雜記俳諧文清寧集異記大亥雜記俳諧文大美雜記歴代罷廢之號神爵宋孝武文明梁簡文元慶唐徳宗天元唐徳宗通乾唐髙祖平成宋神宗豐亨宋神宗美成宋神宗炎興宋髙宗純熙宋孝宗明徳宋元懿太子乾淳宋理宗開興宋理宗至平宋理宗執中清國宋徽宗慶祐宋欽宗歴代建元考卷十
