body:
  text: 歴代建元考卷四秀水鍾淵映撰漢劉氏太祖髙皇帝邦沛人以秦二世元年起兵為沛公乙未楚義帝遣之滅秦為漢王己亥滅楚項氏即皇帝位都長安用秦正以十月為歲首十二月丙午崩孝惠皇帝盈太祖太子以丁未嗣立七年己丑崩母吕后名後宫子為帝子立之太后臨朝九年崩大臣誅吕氏廢少帝太宗孝文皇帝恒太祖子封代王辛酉太尉周勃等迎立之十七年戊寅稱後元年又七年甲申崩本紀十七年得玉杯新垣平令人詐獻之刻曰人主延夀于是天子始更為元年宋胡安國春秋傳曰元年即位之始年也自是累數雖久而不易此前古人君記事之例春秋祖述為編年法及漢文帝惑方士之言改後元年始亂古制夫在位十有六載矣復稱元年可乎孝武又因事别建年號歴代因之或五六年或四三年或一歲再更使記注繁蕪莫之勝載夫歴世無窮而美名有盡豈記久明逺可行之法也必欲傳久當以春秋編年為正孝景皇帝啓文帝太子以乙酉嗣立壬辰中元年戊戌後元年共在位十六年崩世宗孝武皇帝徹景帝子封膠東王立為太子庚子嗣立太初元年正厯始以正月為歲首甲午崩在位五十四年改元十一建元六元光六元朔六元狩六元鼎六元封六山以封泰改元太初四天漢四太始四征和四後元二漢書終軍傳對曰今郊祀未見于神祗而獲獸以饋宜因昭時令日改定告元對奏由是改元為元狩劉仲馮曰按紀獲麟在元狩元年史記封禪書元鼎三年有司始言元不宜以一二數乃目三元曰狩蓋追述也史記封禪書有司言元宜以天瑞命不宜以一二數一元曰建二元以長星曰光三元以郊得一角獸曰狩云漢書本紀夏四月癸卯上還登封泰山降坐明堂詔曰朕以𦕈躬承至尊兢兢焉惟徳菲薄不明于禮樂故用事八神遭天地况著見景象㞕然如有聞震于怪物欲止不敢遂登封泰山至於梁父然後升壇肅然自新嘉與士大夫更始其以十月為元封元年通鑑注曰應劭曰時頻年苦旱故改元為天漢以祈甘雨師古曰大雅有雲漢之詩周大夫仍叔所作以美宣王遇旱災修徳勤政而能致雨故依以為年號也宋胡三省通鑑注曰自古帝王未有年號始起于此貢父曰封禪書云其後三年有司言元宜以天瑞命不宜以一二數推所謂其後三年者蓋盡元狩六年至元鼎元年也然元鼎四年方得寶鼎又無由先三年稱之以此而言自元鼎以前之年皆有司所追命其實年號之起在元鼎故元封改元則始有詔書也宋王樹野客叢談曰前漢諸君末年甚有異者文帝十六年改為後元年其説出于新垣平之詐候日再中以為吉祥故改元以求延年之祚既詐覺被誅景帝猶且因之景帝七年稱中元年又六年稱後元年至三年而終武帝在位五十四年屢更年號最後更為後元而以二年終不知當時何所據而分中與後謂之後則宜若有盡乃不諱何耶自是之後不復建後元之號矣孝昭皇帝弗陵武帝少子以乙未嗣立十三年丁未崩改元三始元六元鳳六下以鳳凰來紀元元平元中宗孝宣皇帝詢初名病已武帝曾孫戾太子孫史皇孫子昭帝崩昌邑王立無道大將軍霍光廢之戊申帝嗣立在位二十五年壬申崩改元七本始四地節四令以先者地震山崩水出欲地得其節于是改元元康四神爵四降以神爵改元五鳳四甘露四降以甘露改元黄龍元髙宗孝元皇帝奭中宗太子以癸酉嗣立在位十六年戊子崩改元四初元五永光五建昭五竟寧元紀元帝邊垂長無兵革之事其改元為竟寧孝成皇帝驁髙宗太子以己丑嗣立在位二十六年甲寅崩改元七建始四河平四輒以河决隄塞平改元陽朔四鴻嘉四永始四元延四綏和二成帝紀河平四年山陽火生石中明年改元為陽朔師古曰朔始也以火生石中言陽氣之始孝哀皇帝欣髙宗孫定陶王子成帝立為太子以乙卯嗣立在位六年庚申崩改元三建平四太初元將即建平二年二月除元夀二建平二年六月待詔夏賀良等言赤精子之䜟漢家厯運中衰當再受命宜改元易號詔曰漢興二百載厯數開元皇天降非材之祐漢國再獲受命之符朕之不徳曷敢不通夫基事之元命必與天下自新其大赦天下以建平二年為太初元將元年號曰陳聖劉太平皇帝漏刻以百二十為度八月詔除之曰待詔夏賀良等建言改元易號增益漏刻可以永安國家朕過聽賀良等言冀為海内獲福卒亡嘉應皆違經背古不合時宜六月甲子制書非赦令也皆蠲除之賀良等反道惑衆下有司皆伏辜孝平皇帝衎髙宗孫中山王子以辛酉嗣立在位五年乙丑為王莽所酖崩改元一元始孺子嬰宣帝曾孫以丙寅立為孺子王莽稱假皇帝在位三年戊辰莽廢為安定公改元二更始時起兵稱皇帝被誅居攝二初始元漢書居攝三年十一月甲子莽上奏太后以居攝三年為初始元年漏刻以百二十為度奏可新王莽元城人元帝后從子初封新都侯進安漢公攝皇帝以己巳簒漢改正朔以十二月為歲首在偽位十五年更始元年癸未為漢兵所誅改元三始建國五天鳳六地皇三漢書天鳳六年春莽見盗賊多乃令太史推三萬六千歲厯紀六歲一改元布天下明年改元地皇淮陽王𤣥景帝後舂陵戴侯曾孫癸未諸將立之于髙陽王莽誅遷都長安三年赤眉入關遇害改元一更始右西漢十一帝二百一十四年外王莽十五年淮陽王三年西漢末諸國考漢劉盆子城陽景王後以乙酉為赤眉所立後二年丁亥降于世祖改元一建世成公孫述茂陵人以更始二年甲申稱蜀王明年癸未即帝位于成都十二年丙申漢將吳漢拔成都戰死改元一龍興時有龍出其府中因以紀號隗囂天水成紀人以更始元年起兵應漢去莽年號改元一漢復按王莽末羣雄競起其年號可考者三他若梁王永鍾武侯望孺子嬰俱以宗室稱帝王郎盧芳俱以為劉氏稱帝其羣盗竊號者淮南李憲齊張歩燕彭寵海西董憲當時紀元與否紀載闕如覽者莫能詳焉世祖光武皇帝秀東陽人長沙定王後以壬午同兄縯舉兵甲申更始封蕭王乙酉即皇帝位于鄗在位三十三年丁巳崩改元二建武三十一建武中元二通鑑考異曰續漢志云以建武三十二年為建武中元元年紀年通譜云據紀志俱出范氏而所載不同此必傳冩脱誤今官書累經校定學者失于精審但見紀元復有建武二字輒以意刪去斯為繆矣梁武帝大同大通之號俱以中字是亦憲章於此今從袁紀范書胡三省通鑑注曰洪氏𨽻釋云成都有漢蜀郡太守何君造尊楗閣碑其末云建武中元二年六月按范史本紀建武三十一年次年改為中元直書為中元元年觀此所刻乃是雖别為中元而猶冠以建武如文景中元後元之類也又祭祀志載封禪後赦天下詔明言云改建武三十二年為建武中元元年東夷倭國傳建元中元二年來奉貢証據甚明宋莒公紀元通譜云紀志俱出范史必傳冩脱誤學者失于精審以意刪去梁武帝大同大通俱以中字是亦憲章于此司馬温公作通鑑不取其説余按考異温公非不取宋説也從袁范書中元者從簡易耳顯宗孝明皇帝莊世祖第四子立為太子以戊午嗣立在位十八年乙亥崩改元一永平十八肅宗孝章皇帝烜顯宗第五子以丙子嗣立在位十四年戊子崩改元三建初八元和三章和二漢紀章和元年秋七月壬戌詔以瑞物仍集改元章和宋王應麟玉海曰賈逵傳陛下通天然之明建大聖之本改元正厯垂萬世則注改元謂改建初九年為元和元年八月癸酉説正厯謂元和二年始用四分厯二月甲寅孝和皇帝肇肅宗第四子以己丑嗣立在位十七年乙巳崩改元二永元十六元興一孝殤皇帝隆和帝少子生始百日嗣立丙午崩改元一延平元孝安皇帝祐肅宗孫廢太子清河孝王慶之子以丁未嗣立在位十九年乙丑崩改元五永初七元初六永寧一建光一延光四孝順皇帝保安帝太子廢為濟陰王乙丑安帝崩閻后立北鄉侯懿懿卒中常侍孫程等奉王即位在位十九年甲申崩改元五永建六陽嘉四永和六漢安二建康一孝冲皇帝炳順帝子年二歲以乙酉嗣立一年崩改元一永嘉元孝質皇帝纘肅宗𤣥孫渤海王子年八歲以丙戌嗣立在位一年為梁冀所酖崩改元一本初元孝桓皇帝志肅宗曾孫蠡吾侯子以丁亥嗣立在位二十一年丁未崩改元七建和三和平一元嘉三永興二永夀二延熹九永康一孝靈皇帝宏肅宗𤣥孫解瀆亭侯子以戊申嗣立在位二十二年己巳崩改元四建寧四熹平六光和六中平六𢎞農懐王辨靈帝子以己巳嗣立尋為董卓所廢酖崩改元二光熹昭寧孝獻皇帝協靈帝中子靈帝崩宦官殺何進董卓因廢何太后少帝為𢎞農王帝以己巳嗣立在位三十二年庚子禪位于魏後十三年壬子崩改元五永漢一初平四興平二建安二十四延康一漢紀中平六年十二月戊戌詔除光熹昭寧永漢三號除三號復稱中平六年右東漢十二帝一百九十六年按東漢羣盗歴陽華孟稱黑帝句章許生稱陽明皇帝黄巾張角稱黄天泰平前史但云偽稱非年號也他若九江馬勉稱帝抱罕宋建稱河首平漢王建號改元而名俱不載至於袁術之僭號夀春亦無從考其年名蓋史家之失紀者多矣昭烈皇帝備涿郡人中山靖王後以建安十九年甲午取益州己亥稱漢中王辛丑即皇帝位三年癸卯崩改元一章武三安樂思公禪昭烈帝太子以甲辰嗣立在位四十三年癸未降于魏改元四建興十五延熙二十景耀六星以太史奏景見改元炎興元三國志評曰禮國君繼體踰年改元而章武之三年則革稱建興考之古義體理為違右後漢二帝四十三年通前二漢四百五十五年宋書五行志劉備卒劉禪即位亦未踰月而改元為建興此言之不從也習鑿齒曰禮國君即位踰年而後改元者縁臣子之心不忍一年而有二君也今可謂亟而不知禮矣君子是以知蜀之不能東遷也後又降晉吳孫亮晉惠帝宋元凶亦然亮不終其位惠帝號令非已元凶尋誅言不從也魏曹氏世祖文皇帝丕譙國人武帝操之子庚子嗣魏王位尋受漢禪稱帝在位七年丙午殂改元一黄初七烈祖明皇帝叡文帝子以丁未嗣立在位十三年己未殂改元三太和六青龍四景初三魏紀青龍元年春正月甲申青龍見摩陂井中二月帝如摩陂而觀龍改元景初元年春正月壬辰山茌縣言黄龍見髙堂隆以為魏得土徳故其瑞黄龍見宜改正朔易服色以神明其政帝從其議三月下詔改元以是月為孟夏四月從地正也三年冬十二月時齊王已即位詔復以建寅之月為正齊王芳明帝養子以庚申嗣立在位十四年癸酉為司馬師所廢改元二正始九嘉平五髙貴鄉公髦文帝孫東海定王子以甲戌嗣立在位六年己卯以討司馬昭遇弑改元二正光二甘露五降以甘露改元元皇帝奐武帝孫燕王宇子以庚辰嗣立在位五年乙酉禪于晉改元二景元四咸熙一右魏五主四十六年附考烈祖景初元年遼東公孫淵自立為燕王遣司馬懿擊斬之淵改元一紹漢吳孫氏大皇帝權吳郡富春人武烈帝堅之子長沙桓王策之弟以漢末有江東壬寅改元辛丑稱帝在位三十一年辛未殂改元六黄武七土以承漢為徳改元黄龍三黄以夏口武昌龍見改元嘉禾六嘉以㑹稽南始平禾生改元赤烏十三太元一神鳳一三國志秋八月武昌言麒麟見有司言麒麟者太平之應宜改年號詔曰間者赤烏集于殿前朕所親見若神靈以為嘉祥若改年宜以赤烏為元羣臣奏曰昔武王伐紂有赤烏之祥君亟觀之遂有天下聖人書策載述最詳者以為近事既嘉親見又明也于是改元㑹稽王亮大皇帝少子以壬申嗣立在位六年為孫綝所廢庚辰歲凶以謠言自殺改元三建興二五鳳二太平二宋書符瑞志孫亮建興二年十一月大鳥五見于春申吳人以為鳳凰明年改元為五鳳又曰吳孫皓建衡三年西苑有鳳凰集以之改元義同于亮景皇帝休大皇帝第六子封瑯琊王以戊寅嗣立在位六年甲申殂改元一永安六歸命侯皓大皇帝孫故太子和之子封烏程侯以乙酉嗣立庚子降于晉在位十七年改元八元興一甘露一露時告蔣陵甘降改元寶鼎三在以所得天鼎改元建衡三鳳凰三凰以西苑言鳯集改元天冊一銀以掘地得冊改元天璽一天紀四水經注孫皓天璽元年吳郡上言臨平湖自漢末穢塞今更開通又于湖邊得石函中有小石青白色長四寸廣二寸餘刻作皇帝字於是改天冊為天璽元年右吳四主五十九年晉司馬氏世祖武皇帝炎河内温人髙祖宣帝懿孫世宗景帝師從子太祖文帝昭子嗣立晉王以乙酉受魏曹代禪庚子平吳在位二十六年庚戌崩改元四泰始十咸寧五太康十太熙元年即惠帝永熙元年宋令狐澄大中遺事裴惲詩有太康字宣宗曰太康失邦何以此謂我宰執奏晉武帝改元太康曰天子須博覽不然幾錯罪惲由是躭味經史夜觀書不休宫中竊目上為老博士孝惠皇帝衷世祖太子以庚戌嗣立在位十六年丙寅崩改元十永熙一永平旋改元康元康九永康一永寧一太安二永安成都王改建武建武旋改永興永興二光熙一永康二年趙王倫簒位尊帝為太上皇尋反正倫誅改元一建始孝懐皇帝熾武帝子封豫章王立為太弟以丙寅嗣立在位五年辛未洛陽陷遷于平陽復二年被弑改元一永嘉孝愍皇帝業武帝孫吳王晏子以癸酉立于長安四年丙子長安陷丁丑遇害改元一建興四右西晉四帝五十二年中宗元皇帝睿髙祖宣帝懿曾孫瑯琊王覲子襲封鎮建業以丁丑稱晉王戊寅即皇帝位在位六年壬午崩改元三建武一大興四永昌一南陽王元保宣帝懿弟髙宻王泰之孫大興二年稱晉王于岐山後為其將張春所弑改元一建康肅宗明皇帝紹中宗太子以癸未嗣立在位三年辛酉崩改元一太寧三顯宗成皇帝衍肅宗太子以丙戌嗣立在位十七年壬寅崩改元二咸和九咸康八康皇帝岳顯宗母弟封瑯琊王以癸卯嗣立明年崩改元一建元二晉帝紀或謂庾冰曰郭璞䜟云立始之際岳山傾立者建也始者元也岳山諱也冰瞿然既而嘆曰如有吉凶豈改易所能救乎至是果驗孝宗穆皇帝𣆀康帝子以乙巳嗣立時方一歲在位十七年辛酉崩改元二永和十二升平五哀皇帝丕顯宗子以壬戌嗣立在位四年乙丑崩改元二隆和一興寧三唐陸勲集異志曰晉哀帝隆和初童謠曰升平不滿斗隆和那得久桓公入石頭陛下徒出走朝廷聞而惡之改年曰興寧人復歌曰雖復改興寧亦自無聊生哀帝尋崩升平五年而穆帝崩不滿斗升平不至十年也海西公奕哀帝母弟以丙寅嗣立在位六年辛未為桓温所廢後薨于吳改元一太和太宗簡文皇帝昱中宗少子封㑹稽王以辛未即位二年壬申崩改元一咸安烈宗孝武皇帝曜太宗太子以癸酉嗣立在位二十四年丙申崩改元二寜康三太元二十一安皇帝徳宗烈宗太子以丁酉嗣立癸卯為桓𤣥所簒甲辰反正二十二年戊午為劉裕所弑改元三隆安五元興三義熙十四晉五行志曰桓𤣥初改年為大亨遐邇讙言曰二月了故義謀以仲春𤼵也愚按元興元年桓𤣥改為大亨矣及簒位建元永始後並黜之但稱元興年恭皇帝徳文安帝母弟封瑯琊王以己未嗣立二年戊申禪于宋辛酉遇弑改元一元熙二右東晉十一帝一百四年通計兩晉一百五十六年附考惠帝永寧元年益州刺史趙廞自稱益州牧氐帥李特討平之偽元一太平見晉春秋惠帝太安二年義陽蠻張昌據江夏奉山都縣吏丘沈為主詐稱漢後陶侃討平之偽元一神鳳海西公太和五年廣漢妖賊李金銀李𢎞詐稱漢歸義侯勢之子自立為聖王益州刺史周楚討平之偽元一鳳凰安帝元興二年楚王桓𤣥廢帝為平固王自稱楚帝明年劉裕等起兵討誅之偽元一永始晉書𤣥傳曰初出偽詔改年為建始右丞王悠之曰建始趙王倫偽號也又改為永始復是王莽始執權之歲其兆號不祥㝠符僭逆如此愚按王氏玉海載桓謙有天康天安二號謙自桓𤣥誅後未嘗僭立豈惡元興之號改立年名而前史微之不載邪然亦不應遽有二號從晉書及通鑑可也歴代建元考卷四
