body:
  text: 歷代建元考卷八秀水鍾淵映撰遼耶律氏太祖大聖大明神烈天皇帝億小字安巴堅其先契丹部酋長以唐天祐四年辛卯稱帝九年建元在位十九年丙戌殂于扶餘府改元三神冊六天贊四天顯一愚按遼史太祖紀二月改元天顯七月上崩而通鑑云契丹改元天顯葬其主安巴堅于木葉山五代史德光立三年改元天顯俱傳聞之誤今從遼史義宗文獻欽義皇帝倍小字托雲太祖太子天顯元年太祖命守東丹國號人皇王稱制行事明年太宗即位庚寅浮海適唐後為唐所殺世宗立追上諡號在東丹時改元一甘露太宗孝武惠文皇帝德光太祖次子以天顯二年丁亥嗣立丙申立石敬瑭為晉帝丁未滅晉入大梁改國號曰大遼還殂于欒城在位二十二年仍稱天顯十二自二年至十三年改元二㑹同八大同一遼史太祖紀天顯二年十月壬戌即皇帝位有司請改元不許世宗孝和莊憲皇帝阮小字烏裕義宗長子以大同元年丁未即位恆州引兵還國五年辛亥為泰寧王察克所殺改元一天祿穆宗孝安敬正皇帝璟小字舒嚕太宗子以天祿五年辛亥嗣位十九年己巳為庖人實庫等所弒改元一應厯景宗孝成康靖皇帝賢世宗第二子以應厯十九年己巳嗣在位十四年壬午殂改元二保寧十乾亨四聖宗文武大孝宣皇帝隆緒景宗長子封梁王以乾亨四年壬午嗣立復國號曰大契丹在位四十八年改元三統和二十開泰九太平十一興宗神聖孝章皇帝宗真聖宗子以太平十一年辛未嗣立在位二十四年乙未殂改元一重熙道宗仁聖大孝文皇帝洪基興宗子以重熙二十四年乙未嗣立辛巳殂在位四十七年復國號遼改元五清寧十二元年即重熙十四年咸雍十太康十太安十夀隆東都事略載有夀昌而范成大攬轡録又稱盛昌六年又玉海載遼國有順天應順二號俱不詳世次蓋南北分隔或語音傳訛或傳寫錯謬兹按遼史悉正之天祚皇帝延禧道宗太子順宗濬之子以夀隆七年辛巳嗣立在位二十四年乙巳為金人所執降封海濵王進豫王殂改元三乾統十隆元年即夀七年天慶九保大五宣宗孝章皇帝淳興宗孫纍封秦晉國王保大二年壬寅天祚入夾山耶律逹實立之于燕京尋卒改元一建福蕭德妃宣宗淳之后淳卒稱制金兵至奔于天祚被殺改元一德興即建福元年梁王雅里天祚第二子以保大三年癸卯耶律迪里等劫之北奔立以為帝後獵察喇山一日射黃羊四十狼二十一致疾卒耶律珠拉繼之為其下所殺改元一神厯右遼九世共二百十年西遼德宗皇帝達實太祖八代孫登天慶五年進士纍官翰林世號逹實林牙以保大二年單騎宵遁甲辰歲二月五日甲午即位于竒爾瑪勒建都呼遜鄂爾多在位十二年丙辰殂改元二延慶三康國十咸天皇后塔布布延德宗蕭后丙申臨朝稱制七年壬戌殂改元一咸清仁宗皇帝伊立德宗子以壬戌嗣立在位十三年甲戌殂改元一紹興承天太后竒爾瑪勒仁宗妹仁宗殂遺詔權國事稱制後與駙馬之弟通出駙馬為東平王殺之十四年戊子為其父所殺改元一崇福正閏考又有重德一號末主珠勒呼仁宗次子以戊子嗣立在位三十四年辛酉以出獵為奈曼王庫楚類伏兵所執尊為太上皇朝夕問起居珠勒呼殂遼祀遂絶改元一天禧右西遼三主二后建號絶漢之外七十六年起甲辰訖辛酉附考聖宗太平九年東京錫里軍詳大延琳僭國號曰興遼明年討擒之僞元一天慶天祚天慶六年禆將渤海髙永昌據遼陽僭號尋為金人所殺僞元一隆基天祚保大三年奚王和勒博僭號後為衆所殺僞元一天復天祚保大三年都統蕭幹自立于奚王府號神聖皇帝國號大奚郭藥師破之為其下所殺僞元一天嗣金完顔氏太祖應乾興運昭德定功睿神章孝仁明大聖武元皇帝旻本名阿固達女真部人以遼天慶五年乙未稱帝癸卯入燕京還殂于布圖濼在位九年改元二收國天輔太宗體元應運世德昭功哲惠仁聖文烈皇帝晟本名烏竒邁太祖弟以天輔七年癸卯嗣立在位十三年乙卯殂改元一天㑹十三輔元年即天七年熙宗𢎞基纘武莊靖孝成皇帝亶太祖孫以天㑹十三年乙卯嗣立在位十四年己巳為平章政事完顔亮所弒仍稱天㑹二十四年十五年改元二天眷三皇統九海陵煬王亮太祖孫以皇統九年己巳弒主自立辛巳伐宋為其下所殺世宗追廢之在位十三年改元三天德四統元年即皇九年貞元四正隆六世宗光天興運文德武功聖明仁孝皇帝雍本名烏䘵太祖孫以正隆六年辛巳即位于東京海陵被弒入燕在位二十九年己酉殂改元一大定二十九六元年即正隆年金史海陵在揚州聞改元大定拊髀嘆曰朕本欲平江南改元大定此非天乎因出其素所書取一戎衣天下大定改元事以示羣臣宋李心傳朝野雜記曰時光守强守諒者言金主已死新君嗣立改元新德大臣信之辛巳春賀正旦使還言金主不死已授甲造舟必為南冦之計章宗憲天光運仁文義武神聖英孝皇帝璟世宗嫡孫以大定二十九年己酉嗣立在位二十年戊辰殂改元三明昌六承安五泰和八衛紹王允濟世宗子以戊辰嗣立在位五年癸酉值元兵入冦為呼沙呼所弒改元三大安三崇慶元至寧元金史衛紹王初即位改元大安四年改曰崇慶既又曰至寧有人語曰三年大崇至矣大崇者大蟲也俄而有呼沙呼之變宣宗繼天興統述道勤仁英武聖孝皇帝珣章宗庶兄以至寧元年癸酉嗣立二年遷汴在位十一年癸未殂改元三貞祐四寧元年即至元年興定五元光南遷録云世宗改元興慶濰王改元天統章宗改元天定考之金史其世系傳次無一是者蓋南人僞書為此書以攄靖康之憤而實非金元氏之實録不足存也哀宗皇帝守緒宣宗太子以元光二年癸未嗣位癸巳自汴奔蔡至明年正月為宋元兵所圍傳位于宗室承麟自縊而殂末帝亦為亂兵所殺凡在位十年改元三大興八開興旋改天興天興右金完顔氏九世一百十八年附考熙宗皇統七年蒙古鄂囉貝勒自稱太祖元明皇帝國號大蒙古遣兵討之不克因與連和改元一天興愚按宋孟珙嘗有言曰蒙古之先世以慕䝉為雄故國號曰大蒙古國然則天㑹皇統間所伐並非却特氏之蒙古也附識于此世宗大定元年契丹伊喇阿哈稱帝明年討平之僞元一天正衛紹王至寧元年癸酉遼人耶律英格據遼東自立為遼王乙亥降于蒙古封遼王改元一元統伊實布本耶律英格黨封郡王英格朝蒙古遂僭帝號于澄州國號遼立七十餘日為其下所殺僞元一天威宣宗貞祐三年益都賊楊安兒僭號登州遣兵擊殺之僞元一天順宣宗貞祐三年宣撫富森鄂諾據遼東稱天王國號大真明年降于蒙古尋僭號東夏天興二年蒙古太宗討擒之僞元一天泰宣宗貞祐二年兖州泗水人郝定反署置百官僭稱大漢皇帝州兵討擒之僞元一順天宋李心傳建炎以來朝野雜記曰又有郝八者名儀以貞祐二年春甲戌本朝嘉定七年據山東叛僭號大齊改元順天金人遣花帽軍擒之磔于開封考之金史本紀及侯摯傳有郝定無郝儀則改元順天者必定也蓋金史失記改元而南中誤傳其名耳宣宗貞祐三年張鯨弟致據錦州自稱漢興皇帝蒙古穆呼哩遣兵平之僞元一興隆宣宗貞祐四年故遼人金山茂伊實布之黨自稱大遼收國王引兵侵髙麗據江東城二年為通古所殺自立哈沙復殺之僭號戊寅耶律英格共擊平之僞元一天德髙麗國史作天成夏李氏景宗武烈皇帝曩霄本名元昊其先拓跋思恭唐末賜國姓鎮夏州傳思諫思恭彝昌仁福彝興克睿繼筠七世至繼捧入朝于宋族弟繼遷遂有銀夏稱夏國王是為太祖神武帝傳于太宗光聖帝德明薨元昊立以宋景祐元年甲戌改元戊寅稱帝在位十七年戊子殂改元四開運一廣運二天慶二天授禮法延祚十一先是元昊初立尚奉宋明道年號諱其父德明之名乃改曰顯道稱于中國甲子㑹紀作改元顯道非也宋景祐元年元昊改元開運或告以石晉敗亡之號乃改廣運毅宗昭英皇帝諒祚景宗長子以戊子嗣立時方期歲在位二十年丁未殂改元五延嗣寧國一天祐垂聖二福聖承道四􅀈都六拱化五惠宗匡靖皇帝秉常毅宗長子以丁未嗣立在位二十年丙寅殂改元四乾道二天賜禮盛國慶五大安十一天安禮定一崇宗聖文皇帝乾順惠宗長子以丙寅嗣立在位五十四年己未殂改元八宋史紹興九年夏主乾順卒天儀治平四天祐民安八永安三貞觀十三雍寧五元德正德八大德仁宗聖德皇帝仁孝崇宗長子以己未嗣立在位五十五年癸丑殂改元四大慶四人慶五天盛二十乾祐二十四桓宗昭簡皇帝純祐仁宗長子癸丑嗣立在位十四年丙寅為鎮夷郡王安全所廢改元一天慶十四襄宗敬穆皇帝安全崇宗孫越王仁友子以丙寅嗣立在位六年辛未殂改元二慶天四皇建二神宗英文皇帝遵頊齊國忠武王彥宗子以宗室試進士及第為大郡督府主襄宗殂以辛未嗣立在位十三年癸未自稱太上皇傳位太子丙戌殂改元一光定獻宗皇帝德旺神宗子以癸未嗣立在位四年丙戌元兵纍逼以憂殂改元一乾定南平王睨宗室清平郡王子以丙戌嗣立明年降于元右夏李氏九主一百九十五年愚按玉海夏國有廣禧清平一號宋史不載唯末主為清平郡王之子亦非年號蓋王氏傳聞之誤也元却特氏太祖法天啓運聖武皇帝特穆津蒙古部人其先世為酋長太祖以金泰和六年丙寅即位于鄂諾河十年克金中都二十一年丁亥平夏還殂太宗英文皇帝諤格德依太祖第三子以己丑嗣立六年滅金十三年辛丑殂皇后奈曼真氏稱制丙午定宗立定宗簡平皇帝庫裕克太宗長子以丙午嗣立三年戊申殂皇后稱制憲宗桓肅皇帝孟克太祖少子圖類之子以辛亥嗣立于鄂諾河九年己未伐宋殂于釣魚山宋孟珙蒙古備録蒙人稱年號曰兔兒年龍兒年至去年方改曰庚辰年今曰辛巳年南遷録載與金國詔稱龍虎九年非也世祖聖德神功文武皇帝呼必賚憲宗弟以己未嗣立于燕京以至元八年改國號大元十三年入宋臨安十六年滅宋于崖山共在位三十五年甲午殂改元二中統四至元三十一成宗欽明廣孝皇帝特穆爾世祖太子珍戩之子以甲午嗣立在位十三年丁未殂改元二元貞二大德十一武宗仁惠宣孝皇帝哈尚世祖子逹爾瑪巴喇之子封懷寧王以丁未嗣立于上都在位四年辛亥殂改元一至大四仁宗聖文欽孝皇帝阿裕爾巴哩巴特喇武宗弟武宗以為太子以辛亥嗣立在位九年庚申殂改元二皇慶二延祐七英宗睿聖文孝皇帝碩迪巴拉仁宗太子以庚申嗣立在位三年癸亥為特克實所弒改元一至治三農田餘話前元英宗年號至治性剛好殺故被弒晉王以藩邸入踐大統識者以至治二字拆成晉王二字數或然也時改元泰定二字出道書非正道也泰定皇帝伊蘇特穆爾太子珍戩嫡孫晉王噶巴拉長子嗣封晉王以癸亥嗣立于龍居河在位五年戊辰殂于上都改元二泰定四致和元厯文宗天元年幼主喇實晉巴泰定帝太子以戊辰嗣立于上都文宗遣兵陷上都不知所終改元一天歷即致和元年明宗順天立道睿文智武大聖孝皇帝和實拉武宗長子封周王戊辰泰定帝殂帝弟文宗立于大都遣使迎帝以己巳即位和寧之北尋暴崩文宗聖明元孝皇帝圗卜特穆爾明帝弟以戊辰嗣立于大都明宗立為太子明年復即位前後在位五年壬申殂改元二天厯二至順三寧宗冲聖嗣孝皇帝伊埒哲伯明宗第二子封鄜王以壬申嗣位尋殂不改元順皇帝托歡特穆爾明宗長子文宗徙之于髙麗移廣西靜江寧宗殂文宗后遣使迎之以癸酉嗣立戊申明兵至通州奔應昌後二年殂國人諡曰惠宗明太祖追諡順帝共在位三十七年改元三元統二至元六至正至元改元詔曰惟世祖皇帝在位長久天人協和諸福咸至祖述之志良切朕懷今特改元統仍為至元年御史李好文言年號襲舊于古未聞不聽昭宗皇帝阿裕爾實哩達喇惠宗太子以庚戌嗣立于應昌李文忠來伐主以餘兵走和哩立十一年而殂改元一宣光按蒙古自昭宗後益王特古斯特穆爾立九年為明將藍玉所破走主音德爾遇弒自後五𫝊至衮特穆爾未幾而弒永樂初果勒齊立衆以非元裔弒之迎順帝後布尼雅實哩為汗布尼雅實哩弒托克托巴哈立正統十四年其臣衛喇特王額森強盛車駕親征被留後奉上歸至景泰四年遂弒托克托布哈自稱大元哈尚汗建元天元尋為部衆所殺復求元裔立之稱小王子迄今支裔尚存而𫝊次無可考矣右元十四主凡一百六十二年中混一八十九年又順帝昭宗建號故國十三年附考世祖至元二十年廣州新㑹民林桂芳趙良鈴作亂自稱羅平國王官軍討平之僞元一延康一作建康順帝至元三年廣州增城民朱光卿自稱大金國尋討平之僞元一赤符按元氏平宋之後反者四起如南朝趙王之類不可殫計而元史所載普寧縣僧陳慶安汝州棒胡稱李老君太子袁州周子旺稱周王各立僞元而其號俱失載元末諸國考宋宋主韓林兒潁川人以至正己未劉福通等迎立之自稱宋裔國號宋號小明王自亳州移都汴梁後奔安豐十二年殂于建康改元一龍鳳十二朱國禎湧金小品載𢎞治間河南府得銅印三百顆俱識年號事聞下禮部上言至順至元至正俱元文宗以後年號龍鳳興定又元末僞宋主年號愚按興定乃金宣宗年名小明王建元龍鳳未嘗復改也一時禮曹諸臣鮮有博雅者遂不及致辨耳天完天完主徐壽輝羅田縣人以至正癸巳據蘄水後移都漢陽庚子為其臣陳友諒弒于江州改元三治平八天啓戊戌一天定己亥一陸深儼仙外集一云夀輝既稱帝湖江浙三省多陷沒開蓮臺省于蘄春然不能制其下陳友諒既殺倪文俊遂率兵攻金陵謀篡其位乃勒死于采石是年五月改大義元年則天啓天定豈友諒已不用治平矣漢漢陳友諒沔陽人為天完將纍封漢王以庚子弒夀輝于采石即皇帝位癸卯冦南昌與太祖戰于鄱陽中流矢卒改元一大義庚申外史曰陳友諒之篡位于徐壽輝也僭號大漢改元天定大義愚考諸書庚子歲友諒改天定二年為大義元年則天定大義實為二號而葛氏誤以為一耳又天啓天定改于夀輝末年或疑即友諒所改是未可知歸德侯理友諒子友諒卒奔還武昌其將張定邊等立之明年降于明改元一德夀吳吳王張士誠泰州人以至正癸巳據髙郵甲午稱誠王國號大周改元尋降于元官太尉癸卯復稱吳王仍奉元朔丁未明兵克蘇州至建康縊死改元一天祐夏先主明玉珍隨州人為天完將將兵破蜀聞友諒弒逆自稱隴蜀王癸卯即皇帝位丙午殂改元一天統歸義侯升王珍太子以丙午嗣立辛亥降于明國亡改元一開熙歷代建元考卷八
