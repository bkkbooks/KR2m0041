body:
  text: 歷代建元考卷五秀水鍾淵映撰東晉列國考漢劉氏趙後改號髙祖光文皇帝淵新興胸奴人以晉永興元年甲子起兵離石自稱漢王戊辰稱帝徙都平陽在位六年庚午殂太子和立為弟聰所殺改元三元熙四永鳳一河瑞一于以得玉璽河改元烈宗昭武皇帝聰淵第四子封楚王庚午殺太子和自立辛未陷洛陽丙子陷長安在位九年戊寅殂改元四光興一嘉平四建元一麟嘉三少主粲聰太子以戊寅自立為靳準所弒改元一漢昌趙主曜淵族子封中山王進封秦王以戊寅即位于赤壁滅靳準改國號趙徙都長安在位十一年戊子為石勒所執遇害明年勒兵平上邽盡滅劉氏曜改元一光初十二魏書云曜得黑兔改元太和按石勒改元太和疆埸相接必無與曜同之理蓋魏收之誤不取光初三年己酉句渠知叛自稱大秦曜遣遊子平逐之句渠知改元一平趙右漢趙劉氏四主二十七年後趙石氏附魏冉閔髙祖明皇帝勒上黨武鄉羯人始起兵附劉氏纍封趙公以己卯稱趙王元年庚寅稱天王尋稱帝都襄國在位十四年癸巳殂改元二太和二建平三海陽王𢎞勒太子以甲午嗣立為石虎所廢遇害改元一延熙元太祖武皇帝虎勒從子一云從弟封中山王纍王魏以乙未自立稱天皇徙都鄴己酉稱帝殂在位十五年改元二建武十四太寧考異曰三十國晉春秋虎即位改元永熙陳鴻大統厯云石虎即位改建平五年為延興明年改建武按三十國晉春秋不記𢎞改元延熙虎之立實延熙元年也故誤云永熙𢎞既號延熙虎安肯稱永熙陳鴻云虎改建平五年為延興即是𢎞踰年不改元也恐鴻説誤建武三年安定王子光自稱大皇帝尋討平之偽元一龍興城王遵虎之子以己酉殺太子世自立在位一百八十三日為冉閔所弒義陽王鑒虎之子以己酉為冉閔所立旋廢弒之盡滅石氏凡立一百三日改元一青龍新興王祇虎之子以庚戌嗣立于襄國二年為其將劉顯所弒降于冉閔改元一永寧二魏武悼天王冉閔魏郡內黃人虎之養孫以庚戌盡滅石氏稱帝三年壬子為燕慕容俊所殺改元一永興右後趙石氏二主五子三十三年冉閔三年成李氏漢後改號始祖景皇帝特巴西宕渠人以晉惠帝太安元年據廣漢稱益州牧明年癸亥改元為羅尚所殺雄立追上諡號建初太宗成皇帝雄特之子以甲子稱成都王丙寅稱帝在位三十年甲午殂兄子班立為雄子期所弒雄改元三建興二晏平五玉衡二十四通鑑考異曰十六國春秋目録雄年號建興二晏平五與華陽國志同今從之諸書雄改元晏平無大武年號惟晉載記改元大武無晏平年號按雄國號大成魏書雄傳云雄稱帝號大成改元晏平故三十國春秋誤云大成載紀傳寫誤為大武今從諸書去大武之號哀皇帝班雄兄蕩之子立為太子以甲午嗣立為期所弒諡戾太子夀立追諡不改元卭都幽公期雄子以乙未自立在位四年為李夀所廢改元一玉恆四愚按李雄改元玉衡其子立復改玉恆衡與恆音相近其義安取𢎞華陽國志無玉衡有玉恆豈玉衡為期所改而紀載傳訛誤以為雄耶抑或期未嘗改元如五代諸君仍稱先號者耶無從考質姑據溫公所載書之漢中宗昭文皇帝夀特弟驤之子纍封漢王以戊戌廢期自立改國號漢在位六年癸卯殂改元一漢興歸義侯勢夀太子以甲辰嗣立在位四年丁未降于桓溫李氏亡勢改元二太和二嘉寧二右成漢李氏五主四十三年秦苻氏髙祖景明皇帝健略陽臨渭氐人太祖惠武帝洪之子洪卒嗣統其衆以晉永和七年辛亥稱天王壬子稱帝都長安在位五年殂改元一皇始四皇始二年張琚殺杜洪自立為秦王屯于宜秋健遣兵滅之琚改元一建昌越厲王生健太子以乙卯嗣立三年丁巳為東海王堅所弒改元一夀光載記羣臣奏曰未踰年而改元非禮也生怒窮推議主得右僕駙段紀殺之世祖宣昭皇帝堅健弟雄之子以丁巳即位癸未伐晉敗還乙酉出奔五將山為姚萇所弒改元三永興二甘露六建元二十建元十年蜀人張育起兵圍成都自稱蜀王遣鄧羌討平之育改元一黑龍哀平皇帝丕堅庶長子封長樂公以乙酉立于晉陽明年為慕容永所敗襲洛陽晉將馮該擊殺之在位二年改元一太安太宗髙皇帝登堅疏族封南安王以丙戌立于隴東在位九年甲午為姚興所敗改元一太初八末主崇登太子以甲午奔湟中即位冬為乞伏乾歸所殺秦亡崇改元一延初太初八年丞相竇衝叛自稱察王討之不克後為姚氏所滅衝改元一元光右秦苻氏六主四十四年燕慕容氏烈祖景昭皇帝俊昌黎棘城鮮卑人髙祖武宣帝廆之孫太祖文明帝皓之子以晉永和五年己酉嗣父燕王位稱元年壬子稱帝徙都鄴在帝位八年庚申殂改元二元璽五國以詐稱得傳璽改元光夀三幽皇帝暐俊太子以庚申嗣立十一年庚午為苻秦所執封新興侯後以謀叛誅改元一建熙十一右燕二主建號十九年通前遼東公廆燕王皓共八十五年後燕慕容氏髙雲附世祖成武皇帝垂太祖文明帝皓之子初封吳王奔秦以晉太元九年甲申起兵稱燕王元年丙戌稱帝都中山在位十三年丙申以伐魏殂于土谷改元一建興十丁零王翟遼以戊子據滑臺自稱魏天王辛卯卒改元一建元翟釗遼之子以辛卯襲父位明年垂兵襲之釗奔長子後為慕容永所殺改元一神鼎一作定鼎烈宗惠閔皇帝寶垂太子以丙申嗣立丁酉魏人攻中山奔和龍戊戌為臣蘭汗所弒在位三年改元一永康永康三年蘭汗弒烈宗自立為昌黎王長樂公盛討平之汗改元一青龍開封公詳以丁酉留守中山自稱帝三月為慕容麟所殺改元一建始趙王麟垂子以丁酉殺慕容詳自立敗奔鄴後為慕容德所殺偽元一延平中宗昭武皇帝盛寶庶長子封長樂王以戊戌討賊嗣立四年辛丑段璣作亂被傷殂改元二建平一長樂二昭文皇帝熙垂裴長子少子封河間王以辛丑討賊立丁未為寶養子髙雲所弒在位七年改元二光始六建始一始即髙雲正元年惠懿帝髙雲寶養子本髙句麗支庶以丁未為馮跋等所立三年己酉幸臣離班姚仁殺之改元一正始右後燕慕容氏四主二十四年髙雲三年西燕濟北王慕容泓俊之子以晉太元九年甲申起兵攻秦旋為其臣髙蓋所殺改元一燕興威帝沖俊之子以故中山王同泓起兵為髙蓋所立乙酉稱帝于阿房明年為其下所殺改元一更始段隨慕容沖將為其下所立慕容恆慕容永殺之改元一昌平慕容覬故宜都王桓子為慕容恆所立恆弟韜殺之于臨晉改元一建明慕容瑶沖之子慕容恆立之為慕容永所殺改元一建平慕容忠泓之子永立之為其下刁雲所殺改元一建武慕容永廆弟運之孫以丙戌稱帝于長子九年甲午為垂所滅改元一中興右西燕凡七易主唯慕容永九年南燕慕容氏世宗獻武皇帝備德本名德太祖文明帝皓少子封范陽王以戊戌歲據滑臺稱燕王元年庚子拔廣固都之稱帝乙巳殂在位五年改元一建平六北海王超德兄北海王納之子以乙巳嗣立六年庚戌廣固陷為晉劉裕所殺改元一太上右南燕二世十二年後秦姚氏太祖昭武皇帝萇南安赤亭羌人始祖景元帝弋仲子魏武王襄弟仕苻氏為龍驤將軍以甲申叛秦稱王丙戌稱帝改長安為常安都之在位十年癸巳殂改元二白雀二建初八髙祖文恆皇帝興萇太子以甲午嗣立在位二十二年丙辰殂改元二皇初𢎞始十七改以降稱王元後主泓興太子以丙辰嗣立丁巳降晉劉裕遇害于建康在位二年改元一永和右後秦三主三十四年夏赫連氏世祖武烈皇帝勃勃胸奴劉衛辰之子仕姚秦封五原公以丁未稱大夏天王都統萬己未稱帝在位十八年乙丑殂改元四龍升六鳳翔五昌武一真興六秦王昌勃勃次子以乙丑嗣立在位四年戊辰為魏所獲改元一承光三永魏書作光平康王定昌之弟以戊辰立于平涼四年辛未為吐谷渾王慕􅀈執送于魏被殺改元一勝光右夏赫連氏三主二十六年北燕馮氏太祖文成皇帝跋長樂信都人以慕容熙建始元年丁未擁立髙雲己酉雲被弒跋討殺離班稱天王于和龍在位二十三年庚午殂改元一太平昭成皇帝𢎞跋之弟以庚午殺跋太子翼自立在位六年己卯為魏所逼奔髙麗後二年被殺改元一大興右北燕二主二十八年涼張氏大悼公世子豫附武穆公軌安定烏氏人以永寧元年為涼州刺史建寧二年封西平公在州十三年甲戌薨私諡武元公實軌世子以建興二年襲位在位六年庚辰為妖人劉𢎞所殺私諡昭建興自五年至八年一作改元永安晉書列傳曰元帝即位于建鄴改元大興實猶稱建興六年不從中興之所改也成烈公茂實弟以大興四年襲西平公位趙劉曜拜涼王在位五年甲申薨私諡成建興自九年至十二年一作改元永元忠成公駿實世子以太寧元年嗣立在位二十三年丙午薨私諡文王建興自十三年至三十四年一作改元太元晉書列傳曰太寧元年駿猶稱建興十二年會有黃龍見于揖次之嘉泉石右長汜禕言于駿曰案建興之年是少帝始建之號帝以凶終理應改易朝廷越在江南音問隔絶宜因龍改號以彰休徵駿不從咸和八年駿上疏稱臣而不奉正朔猶稱建興二十一年敬烈公重華駿世子以永和二年嗣立在位十一年癸丑薨私諡桓建興自三十五年至四十一年一作改元稱永樂長寧侯祚重華庶兄癸丑重華薨廢其子哀公曜靈自立甲寅稱帝乙卯宋混起兵殺之改元一和平敬悼公玄靚曜靈弟張瓘等推為涼王在位九年為叔天錫所弒私諡沖建興自四十三年至四十八年一作改元太始晉書列傳曰玄靚既立廢和平之號復稱建興四十九年及天錫專掌朝政改建興四十九年奉升平之號悼公天錫駿少子以興寧元年自立始奉江東正朔在位十三年丙子降于苻秦後淝水之戰歸晉復拜西平公卒升平東晉穆帝號天錫奉之一作改元太清按張氏世為晉藩至奉西朝正朔垂五十年其僭立改元者長寧侯祚耳而小説相傳載有五號考之晉書及北魏書並無其事惟宋龔頴運厯圖載之因書其所奉晉朝正朔而附注于下以俟考涼王大豫故天錫世子天錫南奔大豫亡至河西起兵攻吕光據陽塢自稱涼州牧涼王兵敗為光所殺改元一鳳凰右涼西平公張氏八世七十八年後涼吕氏太祖懿武皇帝光略陽氐人父婆樓苻秦太尉光纍遷驃騎將軍率兵平西域以乙酉還據涼州丙戌聞秦世祖堅亡稱涼州牧酒泉公己丑稱三河王乙未稱天王己亥稱太上皇傳位太子紹殂在位十三年改元四大安三麟嘉七龍飛三承康一隱王紹光太子以己亥嗣立光殂為庶兄纂所弒不改元靈帝纂光庶子封太原公以己亥篡立為吕超所殺在位一年改元一咸寧述異記吕光承康元年有鬼呌於都街曰兄弟相滅百姓斃徼吏尋視之則無頭鬼其年光死子紹代之五日紹庶兄纂殺紹自立據此則吕光尚有承康一號而正史逸之矣今補入建康公隆光弟寶之子以辛丑即天王位三年癸卯納地於姚秦改元一神鼎三小以畨禾得鼎紀元右後涼吕氏三主十八年南涼秃髮氏烈祖武王烏孤河西鮮卑人以晉安帝隆安元年丁酉稱西平王後改稱武威王居樂都三年己亥卒改元一太初康王利鹿孤烏孤弟以己亥襲位稱河西王三年壬寅卒改元一建和景王傉檀利鹿孤弟以壬寅襲位更稱涼王甲辰去年號奉姚秦戊申復稱涼王甲寅降于乞伏氏遇鴆卒改元二𢎞昌三嘉平七右南涼秃髮氏三世十九年北涼沮渠氏業前附段涼王段業京兆人涼吕氏建康太守以丁酉稱涼州牧建康公己亥稱涼王辛丑為沮渠蒙遜所弒改元二神璽二天璽二六一作璽太祖武宣王沮渠蒙遜臨松盧水胡人始起兵奉段業辛丑弒業自稱涼州牧壬子稱西河王辛未稱涼王都姑臧在位三十年卒改元四永安十玄始十五承玄三義和哀王牧犍蒙遜子以癸酉嗣立在位七年庚寅降于魏北涼亡改元一永和七右北涼沮渠氏二世三十九年西涼李氏太祖武昭王皓隴西成紀人為段業效穀令以庚子稱涼州牧涼公都燉煌徙酒泉在位十八年丁巳卒改元二庚子五建初三涼公歆皓世子以丁巳嗣立三年庚申為蒙遜所殺國亡改元一嘉興涼李恂皓子以庚申據燉煌稱涼州刺史明年為蒙遜所殺改元一永建右西涼李氏二世二十四年西秦乞伏氏烈祖宣烈王國仁隴西鮮卑人始事秦世祖堅以乙酉稱大單于尋稱苑川王在位四年戊子殂改元一建義三髙祖武元王乾歸國仁弟以戊子嗣稱河南王前秦封梁王八年改稱西秦王為姚秦所敗降于禿髮氏尋歸姚氏復逃還苑川己酉復稱秦王前後二十四年壬子為國仁子公府所弒改元二太初十三更始二太祖文昭王熾盤乾歸世子以壬子嗣立在位十六年戊辰殂改元二永康八建𢎞八王慕末熾盤世子以戊辰嗣立在位三年壬申為夏主赫連定所殺國亡改元一永𢎞三右西秦乞伏氏四主四十六年南朝宋劉氏髙祖武皇帝裕彭城人漢楚元王後晉下邳太守安帝時起兵誅桓玄封宋王以庚申受晉禪在位三年壬戌崩改元一永初營陽王義符髙祖太子以壬戌嗣立二年甲子徐羡之等廢弒之改元一景平二太祖文皇帝義隆髙祖三子封宜都王以甲子入立在位三十年癸巳為太子劭所弒改元一元嘉三十元嘉三十年太子劭弒帝自立武陵王討誅之偽元一太初世祖孝武皇帝駿太祖第三子封武陵王以甲午討逆嗣立在位十一年甲辰崩改元二孝建三大明八孝建元年豫州刺史魯爽竊造法服登壇自號建平元年扳南郡王義宣為天子遂同反被誅孝建二年雍州刺史武昌王渾與左右作檄文自號楚王改元永光以為戲笑廢為庶人逼令自殺宋史繩祖學齋占畢曰馮鏗事始載後魏孝莊時用錢稍薄髙道穆曰論今復古宜改鑄大錢文載年號以記其始鏗遂以錢載年號始于此愚按杜佑通典歷敘古今錢幣之制載宋武帝孝建初鑄四銖錢文曰孝建一邉文曰四銖則是錢載年號實始于宋武孝建也孝建元年甲午距後魏孝莊永安二年己酉鑄永安五銖錢之歲凡七十有六年紀載昭昭豈可謂始于永安鏗讀書不精誤以髙恭之奏請載年號以記其事始遂以為事始于此不知髙之奏乃謂改鑄大錢年分之始非事始也此固可笑矣又舍中國正統之年號事始取諸北狄偏閏之朝見識何汙下耶廢帝子業世祖太子以甲辰嗣立元年乙巳遇弒改元二永光旋改景和景和太宗改泰始太宗明皇帝彧太祖第十一子封湘東王以乙巳立在位八年壬子崩改元二泰始七泰豫一晉安王子勛世祖子以泰始二年即位潯陽兵敗遇害改元一義嘉蒼梧王昱明帝子以癸丑嗣立四年丁巳被弒改元一元徽四順皇帝凖明帝三子封安成王以丁巳為蕭道成所立三年己未禪于齊被弒改元一升明三右宋八主五十九年附考太祖元嘉九年蜀賊趙廣推道人枹罕程道養為蜀王偽稱司馬氏裴明等討平之偽元一泰始太祖元嘉十三年仇池氏王楊難當自稱大秦王兵敗奔魏改元一建義齊蕭氏太祖髙皇帝道成南蘭陵人仕宋纍封齊王以己未受禪在位四年壬戌崩改元一建元三世祖武皇帝頤太祖太子以壬戌嗣立在位十二年癸酉崩改元一永明十一鬱林王昭業世祖孫文惠太子子立為太孫以癸酉嗣立元年甲戌西昌侯廢弒之改元一隆昌海陵王紀史臣曰郭璞稱永昌之名有二日之像而隆昌之號亦同焉案漢中平六年獻帝即位便改元為光熹張讓段圭誅後改元為昭寧董卓輔政改元為永漢一歲四號也晉惠帝太安二年長沙王事敗成都王穎改元為永安頴自鄴奪駕河間王顒復改元永興一歲三號也隆昌延興建武亦三改年號故知喪亂之軌迹雖千載而必同矣海陵恭王昭文鬱林王弟以甲戌為西昌侯鸞所立旋廢改元一延興髙宗明皇帝鸞太祖從子以甲戌自立在位五年戊寅崩改元二建武四永泰一東昏侯寶卷髙宗太子以己卯嗣立在位三年辛巳遇弒改元一永元三和皇帝寶融髙宗子封南康王以辛丑即位于荆州明年禪于梁遇害改元一中興右齊七主二十二年附考世祖永明四年富陽民唐寓之反稱帝于錢塘發禁兵討平之偽元一興平東昏侯永元二年巴西民雍道晞反自稱鎮西將軍益州兵與郡兵合擊平之偽元一建義梁蕭氏髙祖武皇帝衍南蘭陵人與齊同族始舉兵攻東昏和帝封梁王以壬午受禪在位四十八年己巳為侯景所幽崩改元七天監十八普通七大通二中大通六大同十一中大同二太清二太清二年臨賀王正德叛侯景立為帝明年廢而殺之偽元一正平太宗簡文皇帝綱髙祖第三子初封晉安王立為太子以己巳嗣立二年辛未侯景廢而弒之改元一大寶豫章王棟髙祖曾孫昭明太子孫華容公歡子以辛未為侯景所立尋廢湘東王使人殺之改元一天正武陵王紀髙祖子以壬申即位于蜀癸酉兵敗為元帝所殺改元一天正南史列傳紀僭號于蜀改元曰天正暗與蕭棟同名識者尤之按棟以辛未廢而紀以次年壬申即位於蜀因仍其號若自以為繼統之正者如後漢髙祖自立于晉陽託言未忍忘晉又惡開運之號乃改稱天福閏位無紀紛雜乖錯誠如歐陽所譏也世祖孝元皇帝繹髙祖第七子封湘東王以壬申誅景嗣位于江陵三年甲戌西魏入冦遇害改元一承聖建安公淵明髙祖從子齊人納之于梁乙亥王僧辨立之尋復位于敬帝卒改元一天成敬皇帝方智世祖第九子封晉安王以甲戌稱梁王乙亥嗣立三年丁丑禪于陳遇害改元二紹泰一太平二永嘉王莊世祖孫以戊寅歲王琳自齊迎立居郢州庚辰伐陳兵敗奔齊卒于鄴改元一天啓右梁四主五十六年附考中宗宣皇帝察髙祖孫昭明太子統之第三子初封嶽陽王以承聖三年甲戌魏人立之于江陵在位八年壬午殂改元一大定世宗孝明皇帝巋中宗太子以壬午嗣立在位二十二年乙巳殂改元一天保二十二莒公琮世宗太子以乙巳嗣立二年丁未入朝于隋被廢國亡改元一廣運北史琮年號廣運有識者曰運之為字軍走也吾君其奔走乎右後梁三主三十三年附考髙祖大同元年鄱陽妖賊鮮于琛作亂內使陸襄討擒之偽元一上願髙祖大同八年安成望族劉敬躬據郡反湘東王遣兵平之偽元一永漢髙祖大同十年交址李貫自稱越王至中大同元年討平之偽元一大德太宗大寶二年侯景自稱漢皇帝明年王僧辨等進兵討之走至吳為其下所殺偽元一太始按梁書陳慶之傳大通元年沙門僧強自稱為帝攻陷北徐州其改元無考時帝方崇信釋氏捨身同泰而沙門亦妄竊鴻名蓋沴之召也陳陳氏髙祖武皇帝霸先吳興長城人梁末進封陳王以丁丑受禪在位三年己卯崩改元一永定世祖文皇帝蒨髙祖從子封臨川王以己卯嗣立在位六年丙戌崩改元二天嘉六天康一臨海王伯宗世祖太子以丙戌嗣立在位二年己丑為安成王頊所廢改元一光大髙宗宣皇帝頊髙祖從子封安成王以戊子自立在位十三年壬寅崩改元一太建長城煬公叔寶髙宗太子以壬寅嗣立七年己酉降于隋軍國亡改元二至德四禎明三右陳五主三十一年歷代建元考卷五
