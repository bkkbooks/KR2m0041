body:
  text: 歴代建元考卷六秀水鍾淵映撰北朝魏拓跋氏改氏元髙祖昭成皇帝什翼犍其先世為鮮卑酋長至穆帝猗盧晉封代王傳平文帝煬帝烈帝惠帝臣晉咸康四年戊戌什翼犍嗣立始建年號三十九年丙子為子寔君所弑國破于苻秦拓跋氏中絶建國三十九太祖道武皇帝珪昭成帝嫡孫世子寔之子以丙戌即代王位改稱魏王十三年戊戌取燕即帝位始定國號又十二年己酉為子紹所弑改元四登國十皇始二天興六天賜四太宗眀元皇帝嗣太祖子以己酉討紹嗣立在位十五年癸亥殂改元三永興五神瑞四泰常七魏書神瑞元年春正月辛酉以禎瑞頻集大赦改元世祖大武皇帝燾太宗長子以甲子嗣立在位二十九年為宗愛所弑改元六始光四神䴥四太延五延和三太平真君十一正平太平真君元年六月丁丑皇孫濬生大赦改元取㓂謙之神書云輔佐北方太平真君是也甫安隠王余世祖子壬辰宗愛立之旋為所弑改元一承平通鑑考異曰宋索虜傳燾以烏亦旰用以為太子㑹燾死使嬖人宗愛立可博真為後宗愛博真恐為亦旴所危矯殺之而自立號承平博真懦弱不為國人所附晃子濬字烏雷真勒素為燾所愛燕王㑹國人曰博真非正不宜立真勒嫡孫應立耳乃殺博真及宗愛而立濬為主號曰正平與後魏書不同又云在位二十八年皆宋書之誤也髙宗文成皇帝濬世祖嫡孫太子恭宗晃之子以壬辰誅宗愛嗣立在位十四年乙巳殂改元四興安三興光元太安四和平六顯祖獻文皇帝𢎞髙宗太子以乙巳嗣立在位七年辛亥禪于太子自稱太上皇又五年殂改元二太安二皇興五髙祖孝文皇帝宏顯祖太子以辛亥受禪立後遷都洛陽改姓元在位二十九年乙卯崩改元三延興四承明一太和二十二世宗宣武皇帝恪髙祖太子以己卯嗣立在位十七年乙未殂改元四景明四正始四永平四延昌文景帝愉髙祖子封京兆王以世宗永平元年舉兵于信都稱帝兵敗賜死後子南陽王寶炬立于長安追上謚號改元一建平肅宗孝明皇帝詡世宗太子以乙未嗣立在位十四年戊申為母胡太后所酖殂改元五熙平二神龜二正光五孝昌二武泰一詐潘貴嬪生女胡太后言皇子大赦改元孝昌元年徐州刺史元法僧稱帝尋奔梁梁以為東魏王改元一天啓敬宗孝莊皇帝子攸顯祖孫彭城王勰子戊申肅宗殂胡太后立皇女又立髙祖曾孫釗爾朱榮舉兵討亂奉帝嗣立三年庚戌誅榮尋洛陽陷為其從子兆所弑改元二建義即武泰元年尋改永安永安北海王顥平王詳子嗣父封奔梁永安二年梁兵納之顥即位于睢陽城南入洛陽為爾朱榮所敗走死改元二孝基建武汝南文宣王悦髙祖子以永安三年庚戌為梁人所立聞爾朱兆入洛陽還後歸國為孝武所害改元一更興東海王曄恭宗之後初封長廣王以庚戌為爾朱氏所立明年辛亥廢之而立節閔帝改元一建明節閔帝恭廣陵王羽子辛亥爾朱氏入洛迎立之嗣位一年壬子為髙歡所廢遇酖殂改元一普嘉安定王朗恭宗子章武王之後以辛酉為髙歡所立明年壬子入洛陽與廣陵王同廢更立平陽王修未幾與東海王曄同遇害改元一中興孝武皇帝修髙祖孫廣平王懐子封平陽王以壬子為髙歡所立甲寅西奔長安為宇文泰所弑改元二太昌十二月改永熙永熙三孝武即位紀元永興以與太宗同號故改焉孝静皇帝善見髙祖曾孫清河王懌孫亶世子甲寅歲孝武西奔為髙歡所立徙都鄴是為東魏在位十七年庚子禪于齊遇害改元四天平四元象一興和四武定八魏書元象元年春正月有巨象自至碭郡丁卯大赦改元文皇帝寳炬髙祖孫京兆王愉子封南陽王甲寅孝武殂于長安宇文泰立之在位十八年辛未殂改元一大統十八沈徳符正閏考曰案蘇綽大誥稱中興十一年仍安定王舊號也實則大統九年蓋安定雖髙歡所立仍為歡所弑故追用其年若孝武帝凡三改年號且西奔長安依宇文泰乃盡廢其年不用則以末年與泰有隙也泰之無君且不學如此愚案宇文以髙氏為偽烏肯奉其所立者之號及蘇綽傳中興二十一年即大統之十一年也時有文帝振將墜之緒比之周宣漢光且將行周禮廢年號故改中興耳若云黜正統之孝武而紀未成君之安定非篤論矣况文帝之憑藉宇文大統之元實即泰所改何嫌而并置之乎廢帝欽文帝太子以辛未嗣立壬申稱元年三年甲戌為宇文泰所廢恭皇帝廓文帝子以甲戌為宇文泰所立稱元年三年丙子禪于周未幾遇弑右魏自太祖稱帝傳十五主一百六十年東魏一主十七年附考太宗神瑞二年河西饑胡推胡人白亞栗斯為單于尋為其下所廢偽元一建平髙祖延興元年妖賊司馬小君聚衆反于平陵武昌王渾討平之偽元一聖君世宗正始三年泰州屠各王法智推主簿吕茍兒為主安西將軍陸麗討降之偽元一建明世宗正始三年涇州民陳瞻聚衆稱王兼太僕卿楊椿討斬之偽元一聖明肅宗正光四年沃野鎮民破六韓拔陵及至孝昌元年蠕蠕破殺之偽元一真王肅宗正光五年泰州民莫折大提稱秦王尋卒于念生自稱天子孝昌三年為秦州民杜粲所殺念生偽元一天建肅宗孝昌元年柔𤣥鎮民杜洛周反于上谷後二年為葛榮所殺并其衆洛周偽元一真王肅宗孝昌二年五原降户鮮于修禮反于定州之佐城為其黨洪業所殺偽元一普興肅宗孝昌二年鮮于修禮黨葛榮自稱齊帝至永安二年爾朱榮討擒之偽元一廣安肅宗孝昌二年陳留郡民劉獲鄭辯反于西華尋敗死偽元一肅宗孝昌三年蕭寶寅稱帝于長安明年敗奔万俟醜奴永安二年死改元一隆緒敬宗永安元年河間邢杲反于青州自稱漢王上黨王元天穆討平之偽元一天統敬宗永安元年万俟醜奴自稱天子永安三年爾朱天光討擒之偽元一神獸波斯國獻獅子于魏醜奴留之因以僭號肅宗孝昌元年稽胡劉蠡升自稱天子東魏時髙歡襲之北部王殺之以降偽元一案紀年諸書載有孝文時沙門司馬惠御聖王伊祁茍應王定州人王金駒應王沙門慶大乘幽州人王惠定明法寧武時幽州沙門劉僧紹净居國時王孝明時陳雙熾始建又敬宗時劉舉皇武考之魏書及北史或以名國或以自號不言改元也去之孝静皇帝天平三年汾州胡王迢觸曹貳龍聚衆反署置百官渤海髙歡討平之偽元一平都齊髙氏顯祖文宣皇帝洋渤海蓨人太祖神武帝歡之子世宗文襄帝澄之弟嗣封齊王以庚午受魏静帝禪在位十年己卯殂改元一天保十北齊書帝紀初帝登阼改年為天保士有深識者天保之字為一大人只十帝其不過十乎廢帝濟南王殷顯祖太子以己卯嗣立元年庚辰為常山王演所廢後遇害改元一乾明肅宗孝昭皇帝演顯祖弟封常山王以庚辰自立在位一年殂改元一皇建世祖武成皇帝湛肅宗弟封長廣王以辛巳嗣立五年禪于太子稱太上皇四年殂改元二太寧一河清四後主温公緯世祖太子以乙酉受内禪立在位十三年丁酉為周師所逼禪于太子恒尋被執後遇害改元三天統五武平八隆化一北史劉逖傳武成崩和士開欲改元議者各異逖清為武平私謂士開曰武平反為明輔逖作此以為公士開悦而從之安徳王延宗世宗子以隆化元年留守晉陽即帝位二日城陷為周師所執改元一徳昌北齊書傳延宗改元識者以為徳昌之文纔得二日果二日而敗幼主恒後主太子以丁酉受内禪立方八歲尋為周所執國亡改元一承光二范陽王紹義顯祖子以丁酉奔突厥即位庚子突厥執送于周徙蜀疾卒改元一武平愚案後主年號武平至八年改隆化明年幼主改承光未幾國亡范陽蓋以二號為亡國時所改仍稱武平以繫民望如後漢劉氏之天福耳前史俱曰改元非也右齊五主二十八年周宇文氏閔帝覺其先鮮卑宇文部人太祖文帝泰之子嗣為周公以丙子受魏禪稱天王元年晉公護廢而弑之世宗明皇帝毓太祖文帝子封寧都公以丁丑嗣稱天皇己卯即皇帝位庚辰殂在位四年改元二武安二武成二北史崔猷傳曰周明帝即位時依周禮稱天王不建年號猷以為世有澆淳故帝王因以沿革請遵秦漢稱皇帝建年號朝議從之髙祖武皇帝邕太祖文帝第四子封魯公以庚辰嗣立丁酉滅齊在位十九年戊戌殂改元四保定五天和六建徳六宣政一宣皇帝贇髙祖太子以戊戌嗣立己亥傳位太子稱天元皇帝庚子殂改元一大成静帝旋改大象静帝闡一作衍宣帝太子以己亥受禪立辛丑禪隋遇害改元二大象大定右周五主二十六年附考髙祖建徳五年稽胡劉蠡升之孫沒鐸自稱聖武皇帝明年齊王憲討平之偽元一石平隋楊氏髙祖文皇帝堅𢎞農人仕周襲爵隨公以辛丑受周禪改隨作隋九年平陳在位二十四年甲子為太子廣所弑改元二開皇二十仁夀四長以隋興以來晝日漸取其意以紀元煬皇帝廣髙祖次子初封晉王謀廢太子勇立為太子以甲子立在位十四年戊寅為宇文化及弑于江都越王侗立追謚世祖明皇帝改元一大業十四恭皇帝侑煬帝孫元徳太子之子封代王留守西京以大業十三年丁丑為唐公李淵所立遙尊煬帝為上皇禪于唐封􅀈國公明年殂改元一義寧秦王浩髙祖孫秦王俊之子宇文化及立之于江都至魏縣弑之恭皇帝侗元徳太子之子代王兄封越王留守東京戊寅煬帝崩為留守官所立明年己卯王世充簒立被廢為潞國公遇弑改元一皇泰右隋三帝三十八年恭帝侗二年附考煬帝大業九年扶風桑門向海明自稱皇帝太僕楊義臣討平之偽元一白烏煬帝大業十年延安賊帥劉迦論自稱皇王屈突通擊平之偽元一大世恭帝侑義寧元年十二月桂陽人曹武徹反後事史失載改元一通聖恭帝侗皇泰元年時代王以禪唐故以皇泰紀元宇文化及弑秦王浩稱帝于魏縣國號許明年己卯夏王竇建徳討誅之改元一天夀恭帝侗皇泰元年懐戎沙門髙曇誠自稱大乘皇帝髙開道襲殺之偽元一法輸隋末諸國考案隋末群雄並起離石劉胡自稱天子李𢎞芝自稱唐王下至管崇朱燮並竊鴻名而紀年之號史俱失載譬猶銅為黑山之流俱在所畧若沈氏正閏考則𤨏𤨏竊盗亦不復遺蓋彼意在博考而予則唯重年名耳魏邢公李宻周李弼曾孫隋時襲封蒲山公以楊𤣥感黨亡命大業十三年丁丑據洛口倉即魏公位稱元年二年戊寅為王世充所敗奔唐尋叛誅河洛記曰改元永平夏夏王竇建徳漳南人以大業十一年起兵丁丑稱長樂王都樂夀戊寅改國號夏二年己卯誅宇文化及四年辛巳以救王世充為唐所殺改元二丁丑元五鳳四燕燕王髙開道渤海人以大業十一年起兵掠燕地尋據北平戊寅稱燕王辛巳降唐尋叛甲申為其下所殺改元一始興通鑑考異曰實録唐書皆無開道年號柳璨注正閏位厯六年號天成李昉歴代年號亦如之宋庠紀年通譜武徳元年開道年號始興云出歴代紀要録此號未知孰是今從紀要漢東漢東王劉黑闥漳南人夏王建徳故將漢東公以辛巳為建徳舉兵壬午稱王癸未為其下執送于唐遇害改元一天造梁梁王蕭銑梁中宗宣皇帝曾孫隋末為羅川令以大業十三年丁丑為巴陵校尉董景珍等所推稱梁王明年即帝位于江陵辛巳降于唐軍至長安遇害改元一鳳鳴凉凉主李軌武威人隋鷹揚府司馬以大業十三年丁丑起兵稱河西大凉王明年稱帝二年丁卯為其臣安興貴執送長安被殺改元一安樂梁梁氏梁主梁師都隋鷹揚郎將以大業十三年丁丑起兵據朔方即皇帝位十二年戊子弟洛仁殺以降唐改元一永隆永樂永樂王郭子和蒲城人隋左翊衛坐事徙朔榆林以大業十三年丁丑據郡稱王尋降唐賜姓李以功名終改元一丑平舊唐書作正平秦武帝薛舉汾隂人隋金城校尉以大業十三年丁丑起兵據隴西稱西秦覇王尋即帝位二年戊寅卒太子仁杲嗣立為唐秦王所滅改元一秦興定楊定楊主劉武周馬邑人隋鷹揚府校尉以大業十三年丁丑據馬邑戊寅稱帝于汾陽宫庚辰為唐所敗奔突厥被殺改元一天興吳吳王李子通東海人以大業十一年乙亥起兵淮南己卯稱帝于江都三年辛巳為杜伏威執送于唐以叛誅改元一明政吳王杜伏威章邱人以大業十一年乙亥起兵淮南隋恭帝侗封楚王唐改封吳王入朝薨梁沈氏梁王沈徳興武康人隋吳興太守聞宇文化及弑逆舉兵己卯稱王都毗陵二年庚辰為李子通所敗走死改元一延康楚附操帥乞元興王操帥乞鄱陽人以大業十二年丙子舉兵稱王尋中流矢卒其將林士𢎞代統其衆改元一始興楚主林士𢎞鄱陽人以大業十二年丙子稱帝七年壬午走入安成山洞病卒其衆遂散改元一太平七錄唐髙祖實作延唐楚楚朱粲城父人以大業十一年乙亥據漢南稱帝降唐封楚王復叛歸王世充世充平伏誅改元一昌達鄭鄭主王世充本西域胡人姓支氏仕隋恭帝侗為太尉鄭國公進封王以皇泰二年簒立三年辛巳降于唐軍徙蜀為仇家所殺改元一開明宋宋主輔公祏臨濟人吳王杜伏威長史以癸未舉兵稱帝于丹陽明年為李靖所殺改元一天明愚案宋小説載宋乾徳初元有丹陽人掘地獲古銅錢文曰大宋乾徳通寶識者知為輔公祏所鑄今考諸史公祏號天明非乾徳也蓋小説家因竇儀辨蜀鏡事而譌者今不取唐李氏髙祖神堯大聖大光孝皇帝淵隴西成紀人凉太祖武昭王之後隋時襲祖虎爵唐國公以丁丑自太原留守起兵入長安戊寅受隋禪在位九年丙戌傳位于太子稱太上皇又十年乙未崩改元一武徳九太宗文武大聖大廣孝皇帝世民髙祖次子初封秦王隠太子建成誅立為皇太子丙戌受内禪在位二十三年己酉崩改元一貞觀二十三愚案宋應麟玉海載唐濮王天夀一號濮王即魏王泰太宗愛子以奪嫡降封無僭號改元之事不知王氏何據姑識于此髙宗天皇天聖大𢎞孝皇帝治太宗第九子初封晉王立為皇太子以己酉嗣立在位三十四年癸未崩改元十五永徽六顯慶五龍朔三麟徳二州以絳産麟又含元殿前麟趾見于是改元乾封二山以封泰改元總章二堂以將作明改元咸亨四上元二儀鳳二調露一永隆一開曜一永淳二生以皇孫改元𢎞道一儀鳳三年四月詔改明年為通乾元年十二月罷通乾號中宗孝和大聖大昭孝皇帝顯髙宗第七子初封英王名哲立為皇太子以癸未嗣立元年甲申武后廢為廬陵王居房州改元一嗣聖武后旋改文明則天武后髙宗后以甲申廢中宗立睿宗為帝臨朝稱制又五年自稱皇帝改國號周乙巳復位于中宗偽立二十一年改元十七文明旋改光宅光宅一垂拱四永昌一載初一元以始用周正改永昌年十一月為正月天授二即元年載初九月是月始自稱皇帝如意九月即長夀長夀二延載一證聖一天冊萬歲萬歲通天神功一聖厯二久視二復元年始夏正大足以成州言佛跡見改元旋改長安長安四通鑑太后春秋雖髙善自塗澤雖左右不覺其衰以齒落更生御則天門赦天下改元通天紀異録曰太后既立國號周又欲立武三思為後狄仁傑切諫后曰奈何有武氏臨朝萬萬年之謠對曰陛下改萬歲登封又改萬歲通天又改大足元年則萬萬之數足矣后大悟即有歸中宗之意中宗皇帝以己亥自房州還武后立為太子乙巳復立反周為唐庚戌為韋后所弑改元二神龍二景龍四殤皇帝重茂中宗少子封温王以庚戌為韋后所立遜于相王改元一唐隆愚案玉海云或曰唐元唐興唐安蓋開元天寶之間避諱改稱者而唐㑹要唐大詔令皆書唐隆實則明皇踐阼之懴猶漢安樂之炎興也睿宗𤣥真大聖大興孝皇帝旦髙宗第八子封豫王嗣聖元年為武后所立天授元年廢為皇嗣中宗朝封相王韋后弑逆王子臨淄王隆基誅之以庚戌迎立帝二年壬子傳位太子後四年崩改元三景雲二太極旋改延和延和𤣥宗立改為先天景雲元年鄭愔與張靈均謀立中宗子譙王重復改元中元克復謀覺伏誅𤣥宗至道大聖大明孝皇帝隆基睿宗第三子初封臨淄王舉兵討韋氏進封平王旋立為太子以壬子受禪立乙未安禄山反丙申幸蜀太子即位靈武尊為上皇後還長安壬寅崩在位四十四年改元三先天元開元二十九天寶十四改天寶三年始年為載嘉話錄李丞相泌謂徳宗曰陛下天寶元年生嚮外言改年之由或以𢎞農得寶此乃謬也陛下此年降誕故𤣥宗皇帝以天降至寶因改年號天寶也開元傳信錄曰唐開元末于𢎞農古函谷關得寶符白石赤文止識枽字識者解之曰枽者四十八所以察聖人御厯之數也及帝幸蜀之來歲正四十八年得寶之時天下歌之曰得寶耶𢎞農耶𢎞農耶得寶耶得寶之年遂改年為天寶愚案天寶元年春正月丁未朔改元甲寅陳王府參軍田同秀上言𤣥元皇帝于丹鳳門之空中告以我藏靈符在尹喜故宅上遣使于故函谷關尹喜臺旁求得之壬辰羣臣上表以函谷靈符潛應年號先天不違請于尊號如天號字史書如此其不因得寶改年明矣錄言妄也天寶二載春正月丙申朔改年曰載肅宗文明武徳大聖大宣孝皇帝亨𤣥宗第三子封忠王立為太子丙申𤣥宗幸蜀即位于靈武克復兩都在位六年壬寅崩改元四至徳二乾元二載自後復以為年上元二寶應二賜以楚州表言天寶玉改元乾元二年制去年號但稱元年以建子月為歲首月皆以所建為數明年建巳月甲子改元寶應復以建寅為正月月數皆如其舊代宗睿文孝武皇帝豫本名俶肅宗太子初封廣平王將兵復兩京以壬寅嗣立在位十八年己未崩改元三廣徳三永泰二大厯十四廣徳二年吐畨入京師立邠王守禮孫承宏為帝改元年號無考置百官冦退放之于華州徳宗神武孝文皇帝适代宗太子以己未嗣立癸亥涇源兵亂出奔甲子還京師在位二十六年甲申崩改元三建中四興元一貞元二十一愚案玉海徳宗擬改元元慶復改貞元蓋合貞觀開元之名從李泌言也順宗至徳𢎞道大聖大安孝皇帝誦徳宗太子以甲申嗣立明年傳位太子稱上皇崩改元一永貞憲宗昭文章武大聖至神孝皇帝純順宗太子以丙戌受内禪立在位十五年庚子崩改元一元和十四穆宗睿聖文惠孝皇帝恒憲宗第三子以庚子嗣立在位五年甲辰崩改元一長慶四敬宗睿武昭應孝皇帝湛穆宗長子以甲辰嗣立在位三年為宦官蘇佐明等所弑改元一寶厯三文宗元聖昭獻孝皇帝昂穆宗第二子封江王丙午宦官王守澄等立之在位十四年庚申崩改元二太和九開成五武宗至道昭肅孝皇帝炎穆宗第五子封頴王庚申中尉仇士良等迎立之在位六年丙寅崩改元一㑹昌六宣宗元聖至明成武憲文睿智章仁神聰懿道大孝皇帝忱憲宗第十三子封光王丙寅宦官迎立之在位十三年己卯崩改元一大中十三懿宗昭聖恭惠孝皇帝漼宣宗長子封鄆王以己卯嗣立在位十四年癸巳崩改元一咸通十四蘇鶚杜陽雜編曰宣宗製泰邊陲曲其詞曰海岳宴咸通及上垂拱而年號咸通焉僖宗惠聖恭定孝皇帝儇懿宗子封晉王以癸巳嗣立庚子幸蜀乙巳還長安尋奔鳳翔戊申還崩在位十六年改元五乾符五廣明元中和四光啓三文徳光啓二年上幸興元朱玫立襄王煴為帝玫誅煴奔河中為王重榮所殺改元一建貞唐無名氏玉泉子貞錄廣明年號識者以為黄巢日月明年兩京沒焉昭宗聖穆景文孝皇帝曄懿宗第七子封夀王以戊申嗣立庚申為宦官劉季逑等所幽立太子裕辛酉反正宦官韓全誨等刼幸鳳翔癸亥還京甲子遷洛為朱全忠所弑在位十六年改元七龍紀二大順三景福三乾寧五光化四天復四天祐一大唐雜記曰唐昭宗文徳二年正朔御武徳殿有紫氣出昭徳殿東隅鬱鬰如烟令大内留司尋其所出得金龍子一枚長五寸許羣臣稱賀帝曰朕不以金龍為祥瑞而以偃息干戈為祥瑞卿等各宜盡忠以體朕懐門下奏請改文徳二年為龍紀元年昭宣光烈孝皇帝祝昭宗第九子封輝王以甲子立三年丁卯為朱全忠所簒明年被弑不改元但稱天祐年右唐二十帝共二百九十年附考髙祖武徳六年雋州人王摩沙自稱元帥尋討平之偽元一進通𤣥宗天寶十五載安禄山陷東京自稱大燕皇帝明年為子慶緒所殺偽元一聖武肅宗至徳二載安慶緒弑禄山自立後走鄴郡為史思明所殺偽元二載初天成通鑑考異曰唐厯曰改元天和薊門紀亂曰改元至成與實錄年號不同紀年通譜兩存之今從實錄肅宗乾元二年史思明稱大聖燕王尋稱帝改元上元二年復改元為子朝義所殺凡偽元二順天應天宋沈括夢溪筆談曰熙寧中得大錢三十餘千文皆順天得一當時在廷皆疑古無得一年號莫知何代物予案唐書史思明僭號鑄順天得一錢順天乃其偽年號得一特以名鑄錢耳非年號也肅宗上元二年史朝義弑思明自立代宗廣徳元年兵敗自縊死偽元一顯聖肅宗上元二年梓州刺史段子璋反據綿州自稱梁王岡川兵擊斬之偽元一黄龍肅宗寶應元年浙東賊袁晁反于台州以建丑為正月盡陷信州温州明州諸郡廣徳元年平之偽元一寶勝通鑑考異曰柳璨正閏位厯宋庠紀元通譜皆改元昇國今從新書而沈氏正閏考兩存之愚案袁晁草竊名號旋即執誅不應復有改元之事温公所去是也徳宗建中四年涇原兵亂上奔奉天朱泚稱大秦皇帝于長安明年改號漢稱漢元天皇兵敗西走韓旻斬之偽元二應天天皇徳宗興元元年淮西李希烈自稱大楚皇帝貞元二年其將陳仙竒殺之以降偽元一武成懿宗咸通元年浙東賊裘甫自稱天下都知兵馬觀察使王式討平之偽元一羅平懿宗咸通元年黄巢自稱衡天大將軍僖宗廣明元年陷長安自稱大齊皇帝中和三年敗走四年其甥林言斬之偽元二王霸金統何光逺鑑誡錄曰黄巢犯闕尚讓為相改乾符之號為金統元年昭宗乾寧二年義勝節度使董昌稱帝國號大越羅平明年錢鏐討誅之偽元一順天㑹稽録曰天冊一曰天聖吳越備史曰年號或曰天冊或云天聖皆非也江東羅諫議隠撰吳越行營露布曰羅平者啓國之名順天者建元之始又曰闕門稱天國之樓以㑹府為定室之地明矣案唐髙宗元曰睦州女子陳碩貞反自稱文佳皇帝文佳係偽號非名年然以一女子倡亂致盗鴻名傳之史冊與東漢之徵例徵貳我明之唐賽兒胥人妖矣至𤣥宗時安南梅叔鸞自稱黑帝肅宗時禪將康楚元稱南楚霸王亦盗名字之異者附識之歴代建元考卷六
