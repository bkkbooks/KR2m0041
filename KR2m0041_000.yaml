body:
  text: 厯代建元考政書類二儀制之屬提要臣等謹案厯代建元考十卷國朝鍾淵映撰淵映字廣漢秀水人自來紀元諸書多詳於正統惟國初吳肅公之改元考同及近時萬光泰之紀元叙韻與淵映此書則併僞朝霸國以至草竊僭稱皆一一具載其例以年號相同者列前次以年號分韻排編次列厯朝帝王及僭國始末並外藩亦間及之秩然有序雖載籍浩博搜採難周如蜀王衍宋太祖年號與輔公祏同裘甫有維平之僭成都為西夏之稱凡斯之類不免間有缺漏未可云毫髮無遺然較之吳萬二家足稱賅洽矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:243b77d95cd45cdc18c150aae4d3f1aa4f7cd93903cd62a4571a97277c9ba0ee
