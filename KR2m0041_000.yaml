body:
  text: 厯代建元考政書類二儀制之屬提要臣等謹案厯代建元考十卷國朝鍾淵映撰淵映字廣漢秀水人自來紀元諸書多詳於正統惟國初吳肅公之改元考同及近時萬光泰之紀元敘韻與淵映此書則併偽朝霸國以至草竊僭稱皆一一具載其例以年號相同者列前次以年號分韻排編次列厯朝帝王及僭國始末並外藩亦間及之秩然有序雖載籍浩博搜採難周如蜀王衍宋太祖年號與輔公祏同裘甫有維平之僭成都為西夏之稱凡斯之類不免間有缺漏未可云毫髮無遺然較之吳萬二家足稱賅洽矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:88f4dcc2d10dc37834e066848f748673c6a7e4ff540fe241c0a1986c3f8d79f4
